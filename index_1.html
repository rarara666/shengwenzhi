<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>声纹志 · 六地音乐文化时间线</title>
<style>
:root{
  --bg:#161311; --panel:#201c18; --line:#332d27; --ink:#EDE6D6; --ink-dim:#9A9184; --ink-faint:#6B645A;
  --us:#5B8DD9; --jp:#D96A45; --tw:#3FA37C; --hk:#C75D85; --cn:#D9A03F;
  --coopt:#E4524A; --record:#8F7BE0; --kr:#53B6C6;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:"PingFang SC","Hiragino Sans GB","Noto Sans SC",sans-serif;overflow:hidden;display:flex;flex-direction:column}
header{padding:14px 20px 10px;border-bottom:1px solid var(--line);flex:0 0 auto}
h1{font-family:"Songti SC","Noto Serif SC",serif;font-weight:600;font-size:18px;letter-spacing:.06em}
h1 span.sub{display:block;color:var(--ink-dim);font-size:11px;font-weight:400;letter-spacing:.14em;margin-top:2px}
.bar{display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;margin-top:10px;font-size:12.5px}
.grp{display:flex;gap:6px;align-items:center}
.grp b{color:var(--ink-faint);font-weight:400;margin-right:2px}
.chip{cursor:pointer;padding:3px 10px;border-radius:12px;border:1px solid var(--line);color:var(--ink-dim);user-select:none;transition:.15s}
.chip.on{color:var(--ink);border-color:var(--ink-dim)}
.chip.reg{border-width:1.5px}
.chip.mk.on.coopt{background:rgba(228,82,74,.18);border-color:var(--coopt);color:#F2A29D}
.chip.mk.on.record{background:rgba(143,123,224,.16);border-color:var(--record);color:#C9BCF2}
input[type=range]{accent-color:var(--ink-dim);width:110px;vertical-align:middle}
#viewport{flex:1 1 auto;overflow:auto;position:relative;cursor:grab}
#viewport.drag{cursor:grabbing}
#canvas{position:relative}
#net{position:absolute;top:0;left:0;pointer-events:none;z-index:1}
.lnk{fill:none;stroke:#EDE6D6;stroke-width:1.2;opacity:.06;pointer-events:stroke;cursor:pointer;transition:opacity .15s,stroke-width .15s}
.lnk.dash{stroke-dasharray:5 5}
.lnk.lit{opacity:.95;stroke-width:2;stroke:#F5C769}
.lnk.pin{opacity:.95;stroke-width:2.2;stroke:#F5C769}
.ev.pinres .lbl{color:#F5C769}
body.net .ev{opacity:.22}
body.net .lnk{opacity:.45}
body.net .lnk.lit{opacity:1}
.ev{z-index:2}
.decade{position:absolute;top:0;bottom:0;border-left:1px solid var(--line)}
.decade i{position:sticky;top:0;display:inline-block;font-style:normal;font-size:11px;color:var(--ink-faint);padding:4px 0 0 5px;letter-spacing:.08em}
.lane{position:absolute;left:0;right:0;border-bottom:1px solid var(--line)}
.lane-label{position:sticky;left:8px;z-index:5;display:inline-flex;align-items:center;gap:6px;font-family:"Songti SC","Noto Serif SC",serif;font-size:14px;letter-spacing:.2em;padding:6px 12px;margin-top:4px;background:rgba(22,19,17,.88);border:1px solid var(--line);border-radius:14px;cursor:pointer;user-select:none}
.axis{position:absolute;left:0;right:0;height:1px;opacity:.35}
.ev{position:absolute;display:flex;align-items:center;gap:6px;font-size:13px;line-height:1.3;white-space:nowrap;cursor:pointer;transition:opacity .15s;padding:6px 4px;margin:-6px -4px}
.ev .dot{flex:0 0 auto;width:8px;height:8px;border-radius:50%}
.ev .rng{flex:0 0 auto;height:5px;border-radius:2.5px;opacity:.85}
.ev.pol{color:var(--ink-dim)}
.ev.pol .dot{width:2.5px;height:11px;border-radius:1px}
.ev.coopt .dot{width:10px;height:10px;border-radius:1px;transform:rotate(45deg);background:var(--coopt)!important}
.ev.record .dot{width:9px;height:9px;border-radius:2px;background:var(--record)!important}
.ev.slow .dot{width:10px;height:10px;border-radius:1px;transform:rotate(45deg);background:transparent!important;border:2px solid var(--coopt)}
.ev.wipe .dot{width:9px;height:9px;border-radius:2px;background:transparent!important;border:2px solid var(--ink-dim);position:relative}
.chip.mk.on.slow{background:rgba(228,82,74,.08);border-color:var(--coopt);color:#F2A29D}
.chip.mk.on.wipe{background:rgba(154,145,132,.15);border-color:var(--ink-dim);color:var(--ink)}
.ev.dim{opacity:.14}
.pe{position:absolute;display:flex;align-items:center;gap:6px;font-size:11.5px;font-style:italic;cursor:pointer;color:var(--ink-dim);padding:5px 4px;margin:-5px -4px}
.pe .bar2{flex:0 0 auto;height:3px;border-radius:1.5px;opacity:.55}
.pe:hover,.pe:active{color:var(--ink)}
.pe.dim{opacity:.14}
.psep{position:absolute;left:0;right:0;border-top:1px dashed var(--line);opacity:.6}
.ppchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.ppchips .pc{border:1px solid var(--line);border-radius:11px;padding:2px 10px;font-size:12px;color:var(--ink-dim);cursor:pointer}
.ppchips .pc:hover{color:var(--ink);border-color:var(--ink-dim)}
.ev:hover{z-index:9}
.ev:hover .lbl{color:#fff}
#sheet{position:fixed;left:0;right:0;bottom:0;background:var(--panel);border-top:1px solid var(--line);padding:16px 22px 20px;transform:translateY(105%);transition:transform .22s ease;z-index:20;max-height:42vh;overflow:auto}
#sheet.open{transform:none}
#sheet h2{font-family:"Songti SC","Noto Serif SC",serif;font-size:17px;margin-bottom:4px}
#sheet .meta{font-size:12px;color:var(--ink-dim);margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#sheet .meta .tag{border:1px solid var(--line);border-radius:10px;padding:1px 9px}
#sheet .struct{font-size:12.5px;line-height:1.7;color:var(--ink-dim);max-width:720px;padding-left:10px;border-left:2px solid var(--line);margin-bottom:10px}
#sheet p{font-size:14px;line-height:1.9;color:var(--ink);max-width:720px;font-family:"Songti SC","Noto Serif SC",serif}
#sheet .x{position:absolute;top:8px;right:8px;color:var(--ink-dim);cursor:pointer;font-size:20px;padding:10px 14px}
footer{flex:0 0 auto;padding:6px 14px max(6px,env(safe-area-inset-bottom));font-size:10.5px;color:var(--ink-faint);border-top:1px solid var(--line);display:flex;justify-content:space-between}
@media (max-width:640px){ .lane-label{font-size:12px} h1 span{display:block;margin:2px 0 0} }

@media (min-width: 900px){
  h1{font-size:20px}
  h1 span.sub{display:inline;margin-left:12px;font-size:12.5px}
  .ev{font-size:11.5px;padding:2px 2px;margin:-2px -2px}
  .lane-label{font-size:14px}
  #sheet{max-height:38vh}
}
</style>
</head>
<body>
<header>
  <div style="display:flex;justify-content:space-between;align-items:baseline">
  <h1>声纹志<span class="sub">六地音乐文化时间线 1800–2026</span></h1>
  <span class="chip" id="drawerbtn">筛选 ▾</span></div>
  <div class="bar" id="bar">
    <div class="grp" id="regs"><b>地区</b></div>
    <div class="grp" id="cats"><b>类别</b></div>
    <div class="grp"><b>聚焦</b>
      <span class="chip mk coopt" data-mk="收编时刻">◆ 收编时刻</span>
      <span class="chip mk record" data-mk="记录机制">■ 记录机制</span>
      <span class="chip mk slow" data-mk="慢性收编">◇ 慢性收编</span>
      <span class="chip mk wipe" data-mk="场景清空">□ 场景清空</span>
    </div>
    <div class="grp"><span class="chip" id="netbtn">显示网络</span></div>
    <div class="grp"><b>缩放</b><input type="range" id="zoom" min="4" max="34" value="9" step="1"></div>
  </div>
</header>
<div id="viewport"><div id="canvas"></div></div>
<div id="sheet"><span class="x" onclick="closeSheet()">✕</span><h2 id="sh-t"></h2><div class="meta" id="sh-m"></div><div class="struct" id="sh-s"></div><p id="sh-n"></p><div id="sh-r" style="margin-top:12px;font-size:11.5px;color:var(--ink-faint);max-width:720px"></div></div>
<footer><span>点击节点查看注释 · 拖拽或滚动平移 · ◆ 收编时刻　◇ 慢性收编　□ 场景清空　■ 记录机制　▏政治/经济　─ 迁移连接　┄ 同构连接（悬停节点点亮）</span><span id="count"></span></footer>
<script>
const DATA = [{"t": "奴隶制下的黑人灵歌与劳动号子", "s": 1800, "e": 1865, "r": "欧美", "c": "宗教", "m": "", "n": "禁鼓令下节奏转入身体与嗓音；圣歌暗藏逃亡密码；摇滚身体技术的最深源头", "d": "南方种植园禁止奴隶使用鼓，因为鼓声可以跨种植园传递信号。节奏于是转入身体：拍手、跺脚、应答式呼喊。灵歌承担双重功能——表面是基督教赞美诗，实际编码着逃亡信息与集会暗号。摇滚乐所有的身体性技术（嘶吼、颤音、集体亢奋）都能追溯到这个被禁止使用乐器的群体如何用肉身保存音乐。"}, {"t": "黑人教会福音音乐成型", "s": 1900, "e": 1950, "r": "欧美", "c": "宗教", "m": "", "n": "呼喊颤音集体亢奋；ecstasy的身体技术后来被世俗音乐整体挪用"}, {"t": "大迁徙与城市布鲁斯", "s": 1916, "e": 1945, "r": "欧美", "c": "经济", "m": "", "n": "南方黑人北迁芝加哥底特律；乡村布鲁斯电气化；工业城市生产工业声音"}, {"t": "留声机与广播普及", "s": 1920, "e": 1935, "r": "欧美", "c": "经济", "m": "", "n": "音乐第一次成为大规模复制商品；种族唱片race records市场出现"}, {"t": "大萧条", "s": 1929, "e": 1939, "r": "欧美", "c": "经济", "m": "", "n": "唱片业崩溃90%；广播免费音乐取代购买"}, {"t": "二战后婴儿潮与丰裕社会", "s": 1946, "e": 1960, "r": "欧美", "c": "经济", "m": "", "n": "teenager作为消费阶层被发明；青年文化=冷战橱窗"}, {"t": "Ray Charles世俗化福音", "s": 1954, "e": null, "r": "欧美", "c": "宗教", "m": "", "n": "I Got a Woman原曲是福音歌改词；南方教会视为亵渎烧唱片", "d": "1954年《I Got a Woman》直接改编自福音歌《It Must Be Jesus》，把献给上帝的狂喜原封不动转向了女人。教会视之为亵渎——他们的判断在技术上完全准确：Ray Charles确实偷走了圣火。这次挪用定义了灵魂乐，也定义了此后所有流行音乐的情感语法：世俗之爱借用宗教狂喜的表达强度。"}, {"t": "Elvis与种族翻唱经济", "s": 1956, "e": null, "r": "欧美", "c": "音乐", "m": "", "n": "黑人音乐白人面孔；原生能量与商业收益的种族分配不均是摇滚原罪", "d": "Sun唱片老板Sam Phillips的名言：给我一个唱黑人音乐的白人，我能赚一百万。Elvis就是答案。Chuck Berry和Little Richard创造了语言，Elvis成为面孔——原生能量与商业收益按肤色分配，这是摇滚乐的原罪，也是此后每次'地下被主流提取'的原型：能量的创造者和收益的获得者从一开始就不是同一群人。"}, {"t": "冷战音乐外交", "s": 1955, "e": 1975, "r": "欧美", "c": "政治", "m": "", "n": "美国之音向铁幕播爵士摇滚；音乐是国务院意识形态出口品", "d": "美国国务院系统性地把爵士乐手（Louis Armstrong、Dizzy Gillespie）派往第三世界巡演，美国之音的Willis Conover爵士节目在铁幕后拥有数千万听众。音乐被明确当作意识形态武器——自由即兴=自由社会的听觉证明。讽刺的是国内这些黑人音乐家仍生活在种族隔离下。音乐冷战的遗产：整个东亚的地下青年都通过'敌台'完成了音乐启蒙。"}, {"t": "苏联骨碟bone music", "s": 1946, "e": 1964, "r": "欧美", "c": "渠道", "m": "", "n": "X光片刻录唱片；与中国手抄歌本打口带同构的冷战地下传播"}, {"t": "Beatles与作者权革命", "s": 1963, "e": null, "r": "欧美", "c": "音乐", "m": "", "n": "乐队自己写歌；表达权从工业作坊转移到创作者"}, {"t": "Dylan插电", "s": 1965, "e": null, "r": "欧美", "c": "音乐", "m": "", "n": "民谣严肃性注入摇滚；抗议歌曲直接来自民权运动集会"}, {"t": "民权法案与越战升级", "s": 1964, "e": 1968, "r": "欧美", "c": "政治", "m": "", "n": "音乐政治化的真实外部压力；征兵抽签让反战有切身性"}, {"t": "迷幻夏天与反文化", "s": 1967, "e": null, "r": "欧美", "c": "宗教", "m": "", "n": "东方宗教迷幻剂公社实验；宗教性从教会转移到亚文化仪式"}, {"t": "Woodstock", "s": 1969, "e": null, "r": "欧美", "c": "音乐", "m": "", "n": "四十万人；代际政治与音乐绑定顶点", "d": "四十万人聚集的直接背景是征兵抽签——台下每个年轻男性都可能被送往越南。音乐节是政治压力的减压阀与集体确认仪式。注意它的商业结局：原本售票的活动因人数失控变成免费，主办方靠电影和唱片版权翻本——现场亏钱、记录赚钱，这个公式在1969年就写好了。"}, {"t": "停止征兵与政治性蒸发", "s": 1973, "e": null, "r": "欧美", "c": "政治", "m": "", "n": "外部压力消失摇滚迅速去政治化工业化；证明政治性是压力的函数"}, {"t": "英国滞涨与垃圾之冬", "s": 1974, "e": 1979, "r": "欧美", "c": "经济", "m": "", "n": "失业率飙升IMF救助英国；No Future是字面处境"}, {"t": "朋克爆发", "s": 1976, "e": 1977, "r": "欧美", "c": "音乐", "m": "", "n": "伦敦纽约同时；核心主张是生产方式DIY而非风格", "d": "朋克真正的遗产不是三和弦，是一套生产关系宣言：你不需要唱片公司、不需要录音室、不需要会弹琴——自己录、自己印、自己卖。Buzzcocks的《Spiral Scratch》EP自筹500镑录制，卖了16000张，证明了独立发行在商业上成立。独立厂牌体系（Rough Trade等）由此诞生，'independent'从形容词变成一种基础设施。"}, {"t": "撒切尔上台与朋克分化", "s": 1979, "e": null, "r": "欧美", "c": "政治", "m": "", "n": "一支进入时尚商品化；一支左转Rock Against Racism对抗国民阵线"}, {"t": "美国朋克去政治化", "s": 1975, "e": 1980, "r": "欧美", "c": "音乐", "m": "", "n": "CBGB是艺术学校美学实验；无阶级危机土壤；形式不携带立场土壤决定立场"}, {"t": "独立厂牌榜单设立", "s": 1980, "e": null, "r": "欧美", "c": "音乐", "m": "记录机制", "n": "indie chart让独立成为统计类别；SST等硬核厂牌自订巡演网络", "d": "1980年英国设立independent chart，入榜标准不是声音风格而是发行渠道——不经过大厂牌分销即为独立。这个统计学决定意义深远：地下第一次有了自己的计分板，乐队可以在不接触主流工业的情况下积累可见的成绩。记录机制的本质就是这个：让主流视野之外的价值可以被度量、被积累。"}, {"t": "MTV开播", "s": 1981, "e": null, "r": "欧美", "c": "经济", "m": "", "n": "视觉化商业时代；主流与地下距离拉到最大"}, {"t": "大学电台与fanzine网络", "s": 1980, "e": 1991, "r": "欧美", "c": "音乐", "m": "记录机制", "n": "地下自建记录传播机制在收编之前就位；这是欧美线最关键的结构事实"}, {"t": "PMRC听证与撒旦恐慌", "s": 1985, "e": null, "r": "欧美", "c": "宗教", "m": "", "n": "里根福音派复兴；重金属倒放讯息诉讼；Parental Advisory标签是宗教政治遗产"}, {"t": "MTV Unplugged开播", "s": 1989, "e": null, "r": "欧美", "c": "音乐", "m": "记录机制", "n": "收编前夜记录机制就位；Nirvana专场1993成为保存什么是真的的范本", "d": "1989年开播时只是省钱的填档节目：不插电、一个舞台、几乎零制作成本。它意外成为了收编时代的'真实性认证机构'——当所有地下乐队都被大厂牌签走、包装、失真之后，Unplugged是唯一能证明'这个乐队到底行不行'的场合。Nirvana 1993年的专场在Cobain死后成为遗嘱级录音。结构教训：记录机制的权威性恰恰在收编造成信任危机时兑现。", "f": "Nirvana《MTV Unplugged in New York》(1994)及其制作口述史"}, {"t": "冷战结束", "s": 1991, "e": null, "r": "欧美", "c": "政治", "m": "", "n": "X世代意义真空；Grunge愤怒无对象因此易商品化"}, {"t": "Nevermind收编时刻", "s": 1991, "e": null, "r": "欧美", "c": "音乐", "m": "收编时刻", "n": "Sub Pop转Geffen挤下Michael Jackson；地下变成另类摇滚营销类别", "d": "1991年9月发行，次年1月把Michael Jackson挤下Billboard榜首。Geffen原本预估销量5万张，最终卖出3000万。此后五年大厂牌用支票扫荡全美地下场景，绝大多数被签下的乐队出一张专辑即被丢弃。地下二十年积累的信任语汇（independent、alternative、DIY）在五年内全部变成营销词汇——这就是收编的完整过程：不是禁止你说话，是把你的语言买走。", "f": "Michael Azerrad《Our Band Could Be Your Band》/《Come as You Are》；纪录片《1991: The Year Punk Broke》"}, {"t": "Cobain之死", "s": 1994, "e": null, "r": "欧美", "c": "音乐", "m": "", "n": "收编代价的象征"}, {"t": "Napster击穿唱片工业", "s": 1999, "e": null, "r": "欧美", "c": "经济", "m": "", "n": "卖唱片逻辑崩塌；现场演出取代唱片成为音乐人主要收入", "d": "1999年上线，两年内注册用户8000万，全球唱片销量从此进入十五年连跌。对音乐人的深层后果：录音从资产变成名片，收入重心被迫转向现场演出——2000年代巡演收入首次超过唱片收入。这次崩塌意外地把价值送回了不可复制的东西：身体在场。livehouse行业的全球性复兴是唱片之死的直接遗产。"}, {"t": "KEXP的YouTube化", "s": 2001, "e": 2010, "r": "欧美", "c": "音乐", "m": "记录机制", "n": "电台转型全球独立音乐权威；靠眼光与信任而非发行渠道"}, {"t": "La Blogotheque", "s": 2006, "e": null, "r": "欧美", "c": "音乐", "m": "记录机制", "n": "巴黎街头录制情境定义内容"}, {"t": "Tiny Desk开播", "s": 2008, "e": null, "r": "欧美", "c": "音乐", "m": "记录机制", "n": "NPR办公桌玩笑起步；诞生于工业崩塌后的记录品牌黄金期", "d": "2008年始于一个玩笑：NPR编辑Bob Boilen在音乐节上听不清演出，同事说'让乐队来你办公桌演好了'。它的权威性建立在三个反工业选择上：不修音、不换景、不看咖位。Anderson .Paak、Mac Miller的Tiny Desk成为定义生涯的演出。证明的事情很简单：唱片工业崩塌后，'眼光+信任'本身就是新的基础设施——这正是TAI要在中文语境里建立的东西。", "f": "NPR官方口述史：How Tiny Desk Began (npr.org)"}, {"t": "Spotify与流媒体时代", "s": 2008, "e": 2026, "r": "欧美", "c": "经济", "m": "", "n": "独立彻底变成审美标签而非生产方式；场景回归小圈子化"}, {"t": "明治开国与西洋音乐植入", "s": 1868, "e": 1912, "r": "日本", "c": "政治", "m": "", "n": "军乐队学校唱歌课；西方音乐经由国家现代化工程进入"}, {"t": "战前流行歌与浅草娱乐", "s": 1914, "e": 1940, "r": "日本", "c": "音乐", "m": "", "n": "古贺政男演歌成型；唱片工业战前已成熟"}, {"t": "国家神道与战时动员", "s": 1931, "e": 1945, "r": "日本", "c": "宗教", "m": "", "n": "音乐全面军歌化；娱乐被战争机器接管"}, {"t": "战败与天皇人间宣言", "s": 1945, "e": 1946, "r": "日本", "c": "宗教", "m": "", "n": "国家神道一夜崩溃；精神真空；新兴宗教在废墟疯长的伏笔", "d": "1946年1月1日，裕仁发布诏书否认自身神性。一个以国家神道为精神地基的社会在一纸文书里失去了信仰对象。这个真空的填充过程贯穿战后日本文化史：新兴宗教爆发、高速增长的物质主义、以及地下文化里那种近乎修行的极端性——当超越性无处安放，有人把它放进了噪音和音量里。"}, {"t": "美军占领与基地俱乐部", "s": 1945, "e": 1952, "r": "日本", "c": "政治", "m": "", "n": "日本乐手为占领军演奏谋生；日本流行乐诞生于占领的屈辱"}, {"t": "美空云雀时代", "s": 1949, "e": 1965, "r": "日本", "c": "音乐", "m": "", "n": "废墟哀歌与美国节奏混合体"}, {"t": "神武景气与高速增长", "s": 1955, "e": 1973, "r": "日本", "c": "经济", "m": "", "n": "收入倍增计划；中产消费社会成型；唱片市场爆发基础"}, {"t": "60年安保斗争", "s": 1960, "e": null, "r": "日本", "c": "政治", "m": "", "n": "几十万人围国会；战后政治能量顶点"}, {"t": "GS热潮Group Sounds", "s": 1966, "e": 1969, "r": "日本", "c": "音乐", "m": "", "n": "模仿披头士的第一波乐队热；商业收割后迅速退潮"}, {"t": "关西民谣（フォーク）与新宿西口集会", "s": 1968, "e": 1969, "r": "日本", "c": "音乐", "m": "", "n": "冈林信康民谣之神；每周数千人地下通道集会被警方清场；空间驱逐线起点", "d": "1969年，每周六晚数千人聚集新宿西口地下广场唱反战民谣，冈林信康、高石友也是精神领袖。警视厅最终以'妨碍通行'为名清场，广场告示牌上'广场'二字被改为'通路'——空间的重新命名就是政治。被驱逐的能量流向两处：一部分进入刚诞生的livehouse系统，一部分随政治退潮消散。空间驱逐线的第一个完整样本：清场、更名、能量转移。"}, {"t": "连合赤军事件", "s": 1972, "e": null, "r": "日本", "c": "政治", "m": "", "n": "浅间山庄直播私刑；左翼理想自我吞噬；社会对政治热情永久创伤", "d": "1972年2月，警方围攻浅间山庄，全国电视直播十天。随后查明：这支极左武装在山中整肃中私刑处死了12名同志，多数罪名是'革命意志不坚定'。日本社会看着左翼理想主义在直播里自我吞噬。此后'政治热情'本身成为羞耻词汇，学生运动断代，整个文化转向去政治化——日本地下音乐从此不再试图改变社会，转而建造不需要社会承认的平行世界。"}, {"t": "裸体的拉里斯（裸のラリーズ）", "s": 1969, "e": 1996, "r": "日本", "c": "音乐", "m": "", "n": "拒绝发行拒绝采访；拒绝被记录成为美学立场；地下转向内在修行", "d": "水谷孝1967年组建，活动近三十年，生前零张正式专辑、几乎零采访、演出用致盲逆光让观众看不清乐手。创始贝斯手若林盛夫1970年参与劫机流亡朝鲜，乐队从此蒙上传说色彩。拒绝被记录在这里是完整的美学立场：存在但不可占有。吊诡的结局：2019年水谷去世后官方档案计划启动，海量现场录音出版——最反记录的乐队最终被最彻底地记录。档案的意志大于个人的意志。", "f": "Julian Cope《Japrocksampler》(2007)；The Last One Musique官方档案系列(2022-)"}, {"t": "日本硬核与暗黑系谱", "s": 1978, "e": 1990, "r": "日本", "c": "音乐", "m": "", "n": "灰野敬二不失者GISM；不追求听众追求极端体验纯度"}, {"t": "livehouse制度与保底制（ノルマ制）诞生", "s": 1973, "e": 1980, "r": "日本", "c": "音乐", "m": "", "n": "京都大阪东京小空间；空间不筛选美学只转移风险；极端音乐都有落脚点", "d": "1970年代京都拾得、大阪、东京陆续出现专门小型演出空间，'ライブハウス'（live house）是和制英语。核心制度是保底制（ノルマ制，norma意为定额）：乐队承诺售出保底票数，卖不够自己补差价。冷酷但结构精巧——场地不做美学审查，只转移经济风险，于是任何极端的音乐都有落脚点。日本地下惊人的多样性（噪音、前卫、硬核共存）是这个制度的直接产物。MAO所在的整个行业的名字和底层规则都来自这里。", "f": "David Novak《Japanoise: Music at the Edge of Circulation》(2013)"}, {"t": "石油危机与转型", "s": 1973, "e": null, "r": "日本", "c": "经济", "m": "", "n": "高速增长终结；产业升级"}, {"t": "广场协议与泡沫经济", "s": 1985, "e": 1991, "r": "日本", "c": "经济", "m": "", "n": "日元升值资产泡沫；City Pop是丰裕本身的声音", "d": "1985年广场协议后日元急升，热钱涌入资产市场，1986-1991泡沫期东京地价可买下整个美国。文化后果立竿见影：唱片制作预算膨胀、CD普及、卡拉OK产业爆发——日本音乐工业的黄金体量在这五年定型。泡沫破裂后进入'失去的三十年'，但音乐生态没有崩塌，而是转入低成本稳态：下北泽的小场地经济恰恰适配低欲望社会。繁荣建的房子，萧条住了进去。"}, {"t": "City Pop巅峰", "s": 1982, "e": 1989, "r": "日本", "c": "音乐", "m": "", "n": "山下达郎竹内玛利亚；电通广告体系运转；主流地下彻底脱钩两个宇宙", "d": "山下达郎、竹内玛利亚、大泷咏一——泡沫经济的声音：都市、恋爱、驾车、度假，制作费近乎无上限，广告与唱片工业深度咬合。它与同期地下（噪音、硬核）互不知晓彼此存在，两个宇宙共用一个城市。四十年后City Pop经由YouTube算法全球复活，成为'蒸汽波'的原料——一种丰裕的声音在丰裕消失后被怀念，消费主义完成了对自己遗骸的二次消费。"}, {"t": "昭和终结", "s": 1989, "e": null, "r": "日本", "c": "政治", "m": "", "n": ""}, {"t": "泡沫破裂", "s": 1991, "e": null, "r": "日本", "c": "经济", "m": "", "n": "失去的十年开始；低欲望社会"}, {"t": "阪神大地震与奥姆沙林事件", "s": 1995, "e": null, "r": "日本", "c": "宗教", "m": "", "n": "战后精神真空的内爆；新兴宗教袭击社会；信仰终结之年"}, {"t": "涩谷系", "s": 1993, "e": 1999, "r": "日本", "c": "音乐", "m": "收编时刻", "n": "小山田圭吾Pizzicato Five；唱片行档案知识做音乐；消费主义精致成美学", "d": "小山田圭吾、小西康阳这批人成长于唱片行，音乐方法是档案学的：引用、拼贴、再语境化，品味本身即作品。它代表一种没有伤口的音乐——不反抗什么，只是无限精致地消费过去。作为收编类型的特殊性：不是主流提取地下，而是地下自愿使用消费主义语法，收编发生在美学内部。乐夏后一部分内地独立音乐的精致化正在重演这个过程。", "f": "若杉実《渋谷系》(2014)；碎片化史料见《Quick Japan》历年专题"}, {"t": "下北泽高圆寺生态稳定", "s": 1995, "e": 2026, "r": "日本", "c": "音乐", "m": "", "n": "经济停滞中livehouse反成低欲望社会的低成本文化栖息地"}, {"t": "中古唱片店与档案帝国", "s": 1980, "e": 2026, "r": "日本", "c": "音乐", "m": "记录机制", "n": "Disk Union体系=分布式档案馆；记录内化为生态日常习惯", "d": "Disk Union体系、各地中古店、每家livehouse的演出流水账、同人志和场刊——日本没有Tiny Desk式的明星记录品牌，因为记录内化成了生态的日常习惯，分布在无数微小节点里。这是与欧美'品牌化记录'相对的第二种形态：分布式记录。TAI的战略选择题就在这两种形态之间：做权威品牌，还是做让记录成为习惯的基础设施。答案可能是先前者后者。"}, {"t": "裸体的拉里斯档案计划启动", "s": 2020, "e": null, "r": "日本", "c": "音乐", "m": "记录机制", "n": "水谷孝身后海量现场录音整理出版；档案本能的极致案例"}, {"t": "日本殖民与唱片工业移植", "s": 1895, "e": 1945, "r": "台湾", "c": "政治", "m": "", "n": "日蓄哥伦比亚在台设分公司；台语流行歌1930年代第一次黄金期"}, {"t": "望春风与殖民地台语歌", "s": 1933, "e": 1940, "r": "台湾", "c": "音乐", "m": "", "n": "邓雨贤李临秋；台语歌第一波高峰后被战时皇民化运动压制"}, {"t": "光复与二二八", "s": 1945, "e": 1947, "r": "台湾", "c": "政治", "m": "", "n": "双重断裂；语言政治成为音乐政治底层"}, {"t": "戒严开始", "s": 1949, "e": null, "r": "台湾", "c": "政治", "m": "", "n": "38年世界最长戒严；警总歌词审查；禁歌清单逼出隐喻技术传统", "d": "1949年5月20日生效，1987年解除，38年。警备总部审查一切公开演出与出版歌词，禁歌理由包括'影射''灰色''日语'。长期审查的意外遗产：台湾词作者发展出华语圈最高密度的隐喻技术——不能直说的都要绕着说，绕着说的都更耐听。罗大佑的批判性、李宗盛的日常诗学，技术根源都在这里。压制与工艺水平的正相关是这条线最苦涩的规律。"}, {"t": "土地改革", "s": 1949, "e": 1953, "r": "台湾", "c": "经济", "m": "", "n": "地主资本强制转入工商业；台湾中小企业主来源"}, {"t": "美援时代", "s": 1951, "e": 1965, "r": "台湾", "c": "经济", "m": "", "n": "15亿美元占同期投资三分之一；技术官僚发展型国家成型"}, {"t": "群星会与国语流行", "s": 1962, "e": 1977, "r": "台湾", "c": "音乐", "m": "", "n": "电视歌唱时代；国语歌统治台语歌被挤压至夜市电台深夜"}, {"t": "加工出口区设立", "s": 1966, "e": null, "r": "台湾", "c": "经济", "m": "", "n": "高雄全球第一个；客厅即工厂；出口导向起飞"}, {"t": "退出联合国", "s": 1971, "e": null, "r": "台湾", "c": "政治", "m": "", "n": "国际身份连环崩塌起点；民歌运动与产业升级的共同触发器"}, {"t": "李双泽淡江事件", "s": 1976, "e": null, "r": "台湾", "c": "音乐", "m": "", "n": "可口可乐瓶质问我们自己的歌在哪里；唱自己的歌运动爆发", "d": "1976年12月3日淡江文理学院民谣演唱会，李双泽拿着可口可乐瓶上台质问：走遍世界喝的都是可口可乐，唱的都是英文歌——我们自己的歌在哪里？随即唱《补破网》被部分观众嘘下台。次年他为救溺水者身亡，年31岁。这个夜晚被追认为民歌运动起点。注意结构：运动的触发不是音乐事件而是身份质问，台湾流行工业的全部人才积累都始于'我是谁'这个问题。"}, {"t": "校园民歌运动", "s": 1976, "e": 1983, "r": "台湾", "c": "音乐", "m": "", "n": "身份危机音乐化；罗大佑李宗盛蔡琴人才库；流行工业的黄埔军校", "d": "1976-1983，大学校园为主场，金韵奖比赛为选拔机制，唱片公司随后收割——新格、海山借比赛签下整代创作者。表面清新的校园歌曲，实际是国际身份崩塌后的集体自我定义工程。人才清单：罗大佑、李宗盛、蔡琴、齐豫、侯德健。台湾流行音乐工业八十年代的爆发，吃的全是这场身份危机储备的人才红利。危机是最好的孵化器，前提是有人给它一个出口。", "f": "马世芳《地下乡愁蓝调》；张钊维《谁在那边唱自己的歌》"}, {"t": "台美断交与十大建设", "s": 1978, "e": 1979, "r": "台湾", "c": "经济", "m": "", "n": "危机驱动升级；新竹科学园区1980台积电1987"}, {"t": "美丽岛事件", "s": 1979, "e": null, "r": "台湾", "c": "政治", "m": "", "n": "党外运动升温；禁歌望你早归变政治集会圣歌"}, {"t": "罗大佑之乎者也", "s": 1982, "e": null, "r": "台湾", "c": "音乐", "m": "", "n": "戒严下隐喻密度的顶点；批判性流行的开端"}, {"t": "解严", "s": 1987, "e": null, "r": "台湾", "c": "政治", "m": "", "n": "同年开放探亲两岸恢复往来；报禁党禁解除在即"}, {"t": "黑名单工作室抓狂歌", "s": 1989, "e": null, "r": "台湾", "c": "音乐", "m": "", "n": "台语说唱直接处理政治；台语摇滚爆发"}, {"t": "林强向前走", "s": 1990, "e": null, "r": "台湾", "c": "音乐", "m": "", "n": "台语歌从悲情翻转为进取；语言翻身的音乐案例"}, {"t": "滚石飞碟黄金期", "s": 1980, "e": 1996, "r": "台湾", "c": "经济", "m": "", "n": "台北成为华语流行首都；这条工业线1992北上就是魔岩进京"}, {"t": "野百合学运与国会改选", "s": 1990, "e": 1992, "r": "台湾", "c": "政治", "m": "", "n": "民主化加速"}, {"t": "春天呐喊", "s": 1995, "e": null, "r": "台湾", "c": "音乐", "m": "", "n": "垦丁；华语世界第一个独立音乐节"}, {"t": "地下社会开业", "s": 1996, "e": null, "r": "台湾", "c": "场地", "m": "", "n": "师大路地下室；浊水溪闪灵1976草东的摇篮", "f": "何东洪等《造音翻土：战后台湾声响文化的探索》(2015)"}, {"t": "首次政党轮替", "s": 2000, "e": null, "r": "台湾", "c": "政治", "m": "", "n": "文化政策转向本土化；独立音乐进入国家文化认同工程"}, {"t": "文化部乐团补助体系", "s": 2007, "e": 2026, "r": "台湾", "c": "经济", "m": "慢性收编", "n": "政府补贴独立音乐；有补贴的地下还是地下吗的争论", "d": "2007年前后成形：录音补助、演出补助、场馆补助、海外参展补助。国家用财政持续输血独立音乐——没有收编时刻，只有收编过程。乐团的生存焦虑被缓解，代价是申请表逻辑渗入创作周期：企划书里的'本土''多元''南岛'成为高频词。慢性收编的定义：不买断你的能量，只是让你的生存慢慢依赖它。五种收编类型里最温柔也最难反抗的一种。"}, {"t": "海洋音乐祭与大港开唱", "s": 2000, "e": 2026, "r": "台湾", "c": "音乐", "m": "", "n": "地方政府支持的独立音乐节体系"}, {"t": "草东获金曲最佳乐团", "s": 2017, "e": null, "r": "台湾", "c": "音乐", "m": "", "n": "击败五月天；独立与主流间制度化旋转门的标志", "d": "2017年草东没有派对击败五月天获金曲最佳乐团。重点不是爆冷，是制度：金曲奖评审体系允许一支厌世系独立乐队在国家级奖项上战胜天团。独立与主流之间存在制度化的旋转门——这在五条线里是台湾独有的结构。旋转门的另一面是驯化风险：当体制会给你发奖，对抗体制的姿态就变成了表演。"}, {"t": "殖民地开埠与广东音乐", "s": 1841, "e": 1930, "r": "香港", "c": "政治", "m": "", "n": "转口港；粤曲粤剧市井娱乐传统"}, {"t": "上海时代曲工业南迁", "s": 1949, "e": 1952, "r": "香港", "c": "经济", "m": "", "n": "黎锦晖体系整体迁港；香港流行乐第一代是难民工业"}, {"t": "国语时代曲统治期", "s": 1950, "e": 1970, "r": "香港", "c": "音乐", "m": "", "n": "姚苏蓉静婷；粤语被视为市井低俗"}, {"t": "左派暴动与殖民治理调整", "s": 1967, "e": null, "r": "香港", "c": "政治", "m": "", "n": "六七暴动后港英转向福利与本土认同建设；无线电视1967开台"}, {"t": "经济起飞与中产成型", "s": 1968, "e": 1980, "r": "香港", "c": "经济", "m": "", "n": "四小龙；本土出生一代成为消费主体"}, {"t": "许冠杰鬼马双星", "s": 1974, "e": null, "r": "香港", "c": "音乐", "m": "", "n": "粤语歌=本土意识诞生；市井语言登上主流", "d": "1974年，港大毕业生许冠杰把市井粤语俚语写进流行曲。此前粤语在娱乐等级里近似台语在台湾：低俗、市井、不登大雅——国语时代曲和英文歌才是体面。《鬼马双星》证明母语可以既商业又时髦，粤语流行曲元年即本土意识元年。语言的翻身永远是身份翻身的第一个信号，这条规律在台语摇滚（1989）身上重演。", "f": "黄霑博士论文《粤语流行曲的发展与兴衰》(2003)"}, {"t": "粤语流行黄金期开启", "s": 1974, "e": 1985, "r": "香港", "c": "音乐", "m": "", "n": "顾嘉辉黄霑电视剧歌曲体系；工业精密化"}, {"t": "中英谈判与联合声明", "s": 1982, "e": 1984, "r": "香港", "c": "政治", "m": "", "n": "1997悬在一切之上；末世感与黄金期同体"}, {"t": "Beyond从地下到主流", "s": 1983, "e": 1993, "r": "香港", "c": "音乐", "m": "", "n": "地下乐队出身写曼德拉；被地下骂背叛；香港没有乐坛只有娱乐圈"}, {"t": "移民潮", "s": 1984, "e": 1997, "r": "香港", "c": "政治", "m": "", "n": "资本与人才外流；时间倒计时感渗入文化"}, {"t": "黄家驹死于东京综艺", "s": 1993, "e": null, "r": "香港", "c": "音乐", "m": "", "n": "死于娱乐工业本身；香港线最重的隐喻", "d": "1993年6月，Beyond在富士电视台游戏节目录制中，黄家驹从舞台跌落，六天后去世，年31岁。乐队当时正因香港市场太小、综艺化生存太耗人而转战日本——结果死在了综艺舞台上。'香港没有乐坛，只有娱乐圈'是他生前的判词，他的死成了这句话最残酷的注脚。个体被工业吸收的代价，在香港线上以最字面的方式呈现。"}, {"t": "四大天王与造星工业顶点", "s": 1992, "e": 1999, "r": "香港", "c": "经济", "m": "", "n": "工业精密到极致；地下空间被地租挤压至近乎不存在"}, {"t": "主权移交", "s": 1997, "e": null, "r": "香港", "c": "政治", "m": "", "n": ""}, {"t": "亚洲金融风暴", "s": 1997, "e": 1998, "r": "香港", "c": "经济", "m": "", "n": "唱片市场萎缩；工业黄金期终结"}, {"t": "工厦音乐场景出现", "s": 1998, "e": 2009, "r": "香港", "c": "场地", "m": "", "n": "工业北移空置工厂大厦成唯一租得起的空间；玩地下音乐首先是房地产问题"}, {"t": "My Little Airport", "s": 2004, "e": 2026, "r": "香港", "c": "音乐", "m": "", "n": "不对抗不呐喊；工业阴影下小丧私语；空间稀缺的美学"}, {"t": "Hidden Agenda开业", "s": 2009, "e": null, "r": "香港", "c": "场地", "m": "", "n": "观塘工厦"}, {"t": "Hidden Agenda驱逐编年", "s": 2009, "e": 2020, "r": "香港", "c": "政治", "m": "", "n": "消防牌照土地用途为名查封搬迁四次；场地存在=法律战争", "d": "2009-2020，观塘工厦，四次被迫搬迁。政府工具箱：地契用途条款、消防条例、娱乐牌照、入境处（2017年以'非法劳工'拘捕演出中的英国乐队TTNG成员）。HA的应对是把每次搬迁做成公共事件，存活本身成为作品。它证明的命题：在地租与法规的绝对压力下，livehouse的存在可以是一种公民行动。这是MAO鼓楼被驱逐史的极端平行版本。", "f": "端传媒Hidden Agenda系列报道(2017)；纪录片《N城记》相关章节"}, {"t": "入境处突袭拘捕乐队", "s": 2017, "e": null, "r": "香港", "c": "政治", "m": "", "n": "以非法劳工名义拘捕演出中的英国乐队"}, {"t": "雨伞运动", "s": 2014, "e": null, "r": "香港", "c": "政治", "m": "", "n": ""}, {"t": "反修例与场景离散", "s": 2019, "e": 2022, "r": "香港", "c": "政治", "m": "场景清空", "n": "MLA停演部分乐队移居台北伦敦；场景进入diaspora状态", "d": "2019年后香港独立音乐进入离散状态：My Little Airport停演，多支乐队及幕后人员移居台北、伦敦、多伦多，部分厂牌转为海外注册。这不是收编——没有任何主体提取这些能量，能量是被直接清空的。场景第一次以diaspora形式存在：香港之声在香港之外延续。五种类型里最彻底的一种终局，也给'空间就是一切'这个香港命题画上了句号。"}, {"t": "上海时代曲工业", "s": 1927, "e": 1949, "r": "内地", "c": "音乐", "m": "", "n": "黎锦晖明月歌舞团周璇；诞生于租界歌舞厅唱片公司；中国第一个流行音乐工业", "d": "黎锦晖1927年前后创立明月歌舞团，周璇、白虹从中走出。依托租界的歌舞厅、电台、百代唱片，形成华语世界第一个完整流行音乐工业：创作-录制-发行-演出-明星制齐备。1949年后被定性'黄色音乐'，人才与资本整体南迁香港——内地线与香港线在这里是同一条线的断裂与分叉。华语流行乐的工业基因是上海的，只是在香港续命。", "f": "Andrew Jones《Yellow Music: Media Culture and Colonial Modernity in the Chinese Jazz Age》(2001)"}, {"t": "左翼音乐运动", "s": 1930, "e": 1949, "r": "内地", "c": "政治", "m": "", "n": "聂耳冼星海；救亡歌咏运动；音乐动员传统的建立"}, {"t": "延安文艺座谈会讲话", "s": 1942, "e": null, "r": "内地", "c": "政治", "m": "", "n": "文艺为政治服务定调；之后数十年文艺政策的源头"}, {"t": "时代曲被定性黄色音乐", "s": 1949, "e": 1952, "r": "内地", "c": "政治", "m": "", "n": "产业南迁香港；内地线与香港线在此分叉"}, {"t": "民间音乐国家化", "s": 1950, "e": 1956, "r": "内地", "c": "音乐", "m": "收编时刻", "n": "第一次收编：民歌采集改编进入文工团建制；收编者是国家机制却同构", "d": "1950年代，全国性民歌采集运动，民间艺人编入文工团，民间乐器标准化并组建民族管弦乐团。第一次收编的完整机制：提取（采录曲调）、改写（新词新编配）、建制化（艺人变文艺工作者）、切断（原生仪式语境消失）。与后两次收编的同构性精确得惊人——只是收编主体从国家换成资本再换成平台。理解1950年代，就理解了2019年。", "f": "杨荫浏《中国古代音乐史稿》；相关研究见钱茸、萧梅论文"}, {"t": "民族管弦乐建制化", "s": 1953, "e": 1960, "r": "内地", "c": "音乐", "m": "", "n": "民间乐器标准化交响化；民间艺人变文艺工作者"}, {"t": "反右与文艺整肃", "s": 1957, "e": null, "r": "内地", "c": "政治", "m": "", "n": ""}, {"t": "文革开始样板戏垄断", "s": 1966, "e": 1976, "r": "内地", "c": "政治", "m": "", "n": "一切民间与流行音乐中断；手抄歌本与偷听敌台成为地下渠道"}, {"t": "手抄歌本与知青歌曲", "s": 1966, "e": 1976, "r": "内地", "c": "渠道", "m": "", "n": "任毅南京之歌死刑改判十年；一首歌可掉脑袋；抄写即筛选传播即学习", "d": "文革中一切流行音乐中断，歌在手抄本里活着：时代曲、苏联歌曲、知青原创。1970年南京知青任毅因《南京之歌》（我的家乡）被判死刑，后改判十年——一首歌的信息成本以命计价。手抄的传播机制值得注意：抄写即筛选（只抄打动你的），传播即学习（抄一遍等于学一遍）。这是五条线上获取成本最高的渠道，也因此塑造了最深的歌与人的绑定。"}, {"t": "短波电台偷听", "s": 1960, "e": 1980, "r": "内地", "c": "渠道", "m": "", "n": "美国之音BBC港台信号溢出；单向随机不可保存的碎片启蒙"}, {"t": "改革开放", "s": 1978, "e": null, "r": "内地", "c": "政治", "m": "", "n": ""}, {"t": "邓丽君走私磁带", "s": 1978, "e": 1985, "r": "内地", "c": "渠道", "m": "", "n": "沿海渔民港澳渠道翻录数代；白天听老邓晚上听小邓；墙外华语世界的发现"}, {"t": "西北风与文化热", "s": 1986, "e": 1989, "r": "内地", "c": "音乐", "m": "", "n": "新启蒙运动大背景；摇滚与寻根文学朦胧诗同属一场文化运动"}, {"t": "清除精神污染", "s": 1983, "e": null, "r": "内地", "c": "政治", "m": "", "n": "邓丽君靡靡之音被批；与美国PMRC同一个十年的平行审查"}, {"t": "留学生使馆圈渠道", "s": 1980, "e": 1992, "r": "内地", "c": "渠道", "m": "", "n": "原版磁带经人际进入；崔健ADO有外籍乐手；80年代摇滚是精英涉外小圈子"}, {"t": "体制内参考文化", "s": 1980, "e": 1992, "r": "内地", "c": "渠道", "m": "", "n": "音乐学院文工团内部资料；反叛工具来自体制内部的悖论；鲍家街43号=中央音乐学院"}, {"t": "崔健一无所有", "s": 1986, "e": null, "r": "内地", "c": "音乐", "m": "", "n": "诞生在工体官方晚会；先主流后地下与欧美日顺序相反；内地线最特殊基因", "d": "1986年5月9日，工人体育馆，'世界和平年'百名歌星演唱会——官方慈善晚会。崔健穿旧军装上台唱了《一无所有》。中国摇滚诞生在体制舞台的正中央，这个出身决定了内地线与所有其他线相反的顺序：先有主流高光，后有地下积累。也埋下了持续四十年的身份焦虑：中国摇滚始终说不清自己到底是反叛还是被特许的反叛。", "f": "郝舫《伤花怒放》；崔健、周国平《自由风格》"}, {"t": "1989", "s": 1989, "e": null, "r": "内地", "c": "政治", "m": "", "n": "之后摇滚被推离主流舞台；1990崔健巡演中途叫停"}, {"t": "魔岩唱片进京", "s": 1992, "e": null, "r": "内地", "c": "音乐", "m": "", "n": "台湾滚石资本北上；签唐朝张楚窦唯何勇；记录权从开始不在内地手里", "d": "1992年台湾滚石旗下魔岩文化进京，张培仁签下唐朝、张楚、窦唯、何勇。台湾工业二十年积累的制作、企划、包装能力整体北上，两年内制造出内地摇滚的黄金期幻觉。关键结构：黄金期是外来资本用成熟工业方法'制造'的，内地自身的生态（场地、厂牌、发行）并不存在。所以资本一撤（1996年前后），整个高光瞬间塌陷——楼是租的，地基从来不是自己的。", "f": "张培仁历年访谈；李皖乐评集《回到歌唱》"}, {"t": "邓小平南巡市场经济确立", "s": 1992, "e": null, "r": "内地", "c": "经济", "m": "", "n": "经济自由先于文化开放；内地进入台湾1980年代的结构位置"}, {"t": "打口带时代", "s": 1992, "e": 2004, "r": "内地", "c": "渠道", "m": "", "n": "欧美库存切口当废塑料进口；汕头潮阳集散；随机性造就歪打正着音乐教育；五道口新街口摊位=信息交易所", "d": "1992年前后，欧美唱片业库存按塑料废料报关进入中国，汕头潮阳集散，流向全国音像摊。切口是销毁标记，也成了身份印记——你的音乐教育取决于你在摊上翻到什么。五道口、新街口的打口摊是前互联网时代的信息交易所与接头点。这代人（树村、无聊军队、D-22乐队）的听觉版图是随机的、断裂的、饥饿的——和流媒体时代的过剩形成完整对照。获取成本越高，音乐与身份绑得越深。", "f": "颜峻《燃烧的噪音》；郝舫相关专栏；纪录片《后革命时代》(2005)"}, {"t": "迷笛学校创办", "s": 1993, "e": null, "r": "内地", "c": "音乐", "m": "", "n": "张帆；穷人进入摇滚的正式通道；不看学历", "d": "1993年张帆创办北京迷笛音乐学校，教摇滚乐器与现代音乐，不看学历、学费低廉。它是外省穷孩子进入摇滚的唯一正式通道：背着吉他来北京，迷笛给你老师、同类和一张床的信息。树村乐队的成员大量出自迷笛。2000年校园汇报演出长成迷笛音乐节——中国第一个原创音乐节的起点是学生汇演。一所学校补上了生态的教育环节，顺手又补上了节日环节。", "f": "张帆历年访谈；《迷笛二十年》纪念文集"}, {"t": "红磡中国乐势力", "s": 1994, "e": null, "r": "内地", "c": "音乐", "m": "收编时刻", "n": "第二次收编：外来资本制造高光；高光先于生态被评拔苗助长", "d": "1994年12月17日，香港红磡体育馆，魔岩三杰与唐朝。香港媒体写'从没有一场演唱会这样疯狂'。它被神话为中国摇滚的顶点，但多年后越来越多局内人称之为拔苗助长：一场由台湾企划、在香港上演、给内地造梦的演出，三地的线在这一夜交汇。高光先于生态的代价随后十年慢慢支付——顶点之后不是平台期，是直接坠落，因为山从来不存在，只有那一根旗杆。", "f": "纪录片《再见，乌托邦》(2009)；演唱会实况《摇滚中国乐势力》(滚石/魔岩, 1995)"}, {"t": "张炬去世魔岩退潮", "s": 1995, "e": 1997, "r": "内地", "c": "音乐", "m": "", "n": "黄金期崩塌；摇滚告别大众舞台进入失语期"}, {"t": "三里屯酒吧街出现", "s": 1995, "e": null, "r": "内地", "c": "场地", "m": "", "n": "摇滚回归小型现场的空间契机"}, {"t": "树村聚居", "s": 1997, "e": 2003, "r": "内地", "c": "音乐", "m": "", "n": "舌头木马痛仰夜叉；月租百元平房；聚居即基础设施；重心从大院子弟转向外省青年", "d": "1997-2003，海淀东北部城乡结合部，月租一两百的平房聚集了舌头、木马、痛仰、夜叉。穷是入场券也是筛选器。聚居本身就是全部基础设施：隔壁即同行，排练互相听得见，设备互借，演出口传。中国摇滚的重心在这里从北京大院子弟转移到外省青年——从特权者的反叛变成无产者的求生。2003年拆迁，人群散去，但'生态可以自建'的证明留下了。", "f": "纪录片《北京浪花》(Beijing Bubbles, 2005)；郝舫《伤花怒放：摇滚的被缚与抗争》"}, {"t": "无聊军队朋克场景", "s": 1996, "e": 2000, "r": "内地", "c": "音乐", "m": "", "n": "北京朋克合辑；DIY逻辑第一次在内地成型"}, {"t": "首届迷笛音乐节", "s": 2000, "e": null, "r": "内地", "c": "音乐", "m": "", "n": "学校汇演长成音乐节；不卖票观众爬墙；生态自己长出节日", "d": "2000年，迷笛学校礼堂及院子，免费入场，观众爬墙进来，乐队自带设备。没有报批逻辑、没有赞助逻辑、没有安保逻辑——生态第一次自己长出自己的节日。此后迷笛逐年扩大并最终商业化、被地方政府当作文旅名片邀请落地，这个轨迹本身就是内地独立音乐二十年的缩影：从爬墙进场到政府招商，中间隔着整个行业的成熟与驯化。"}, {"t": "树村声明", "s": 2001, "e": null, "r": "内地", "c": "音乐", "m": "", "n": "抵制北京乐与路；地下第一次集体主张叙事权；比乐夏早18年的记录权斗争", "d": "2001年，张婉婷电影《北京乐与路》上映，树村音乐人集体抵制并发表声明，拒绝影片对地下生活的浪漫化消费。这是内地地下第一次集体主张叙事权：我们的故事不由外人讲。比乐队的夏天早十八年，记录权战争的第一枪其实早就打响了——只是当时没人有能力把'自己讲'变成一套生产机制。声明抗议了别人的镜头，但自己的镜头还要再等二十年。"}, {"t": "入世", "s": 2001, "e": null, "r": "内地", "c": "经济", "m": "", "n": "国际唱片入华；五月天2004无名高地首演打开内地"}, {"t": "树村拆迁", "s": 2003, "e": null, "r": "内地", "c": "政治", "m": "", "n": "城市化物理抹除场景；空间驱逐线内地段"}, {"t": "D-22与兵马司", "s": 2006, "e": 2016, "r": "内地", "c": "场地", "m": "记录机制", "n": "Michael Pettis；北京新地下第一次被系统录音；补上录音出版缺环的一半", "d": "2006年美国经济学家Michael Pettis在五道口开D-22酒吧，2007年创办兵马司厂牌，系统录制Carsick Cars、PK14、Joyside这批新地下。内地第一次有了'场地+厂牌+录音'的自建闭环，树村时代缺失的记录环节被补上一半——录音室专辑有了，但现场记录仍是空白。注意主理人身份：内地自己的记录机制，第一个版本还是由外国人建立的。"}, {"t": "MAO鼓楼开业", "s": 2007, "e": null, "r": "内地", "c": "场地", "m": "", "n": "李赤与千叶和利；开业首日4位客人3个月后排满；逃跑计划最早听众积累地", "d": "2007年，鼓楼东大街111号。李赤与日本音乐人千叶和利合伙创办，名字取自Musicians/Audience/Organizers三方共生。开业首日4位观众，三个月后档期排满。逃跑计划等乐队在这里积累最早的听众。它与D-22同年出现在北京，构成内地livehouse元年。2015年死于租金与城市改造——生于生态自建的时刻，死于空间政治的规律，MAO自己就是这条时间线的浓缩样本。", "f": "知乎《MAO上海和MAO北京两者是什么关系》长文；《上海壹周》千叶和利专访"}, {"t": "摩登天空与草莓音乐节", "s": 2004, "e": 2015, "r": "内地", "c": "经济", "m": "", "n": "音乐节商业模式成型；地方政府视为文旅名片"}, {"t": "豆瓣网易云与线上聚集", "s": 2005, "e": 2015, "r": "内地", "c": "渠道", "m": "", "n": "MP3/BT下载时代；乐迷社群线上化"}, {"t": "北京奥运", "s": 2008, "e": null, "r": "内地", "c": "政治", "m": "", "n": "城市治理逻辑改变；鼓楼改造前奏"}, {"t": "秀动等票务基础设施", "s": 2016, "e": 2024, "r": "内地", "c": "经济", "m": "", "n": "用户20万到1700万；现场消费习惯养成"}, {"t": "鼓楼改造MAO离开", "s": 2015, "e": null, "r": "内地", "c": "政治", "m": "", "n": "租金暴涨规划调整；空间驱逐线重演"}, {"t": "中国有嘻哈", "s": 2017, "e": null, "r": "内地", "c": "音乐", "m": "", "n": "收编剧本预演；嘻哈先行"}, {"t": "乐队的夏天", "s": 2019, "e": null, "r": "内地", "c": "音乐", "m": "收编时刻", "n": "第三次收编：综艺平台一次性提取地下二十年能量；独立音乐变身份消费标签", "d": "2019年，爱奇艺。地下二十年积累的乐队库存被一档综艺一次性提取：新裤子、痛仰、刺猬——树村一代和D-22一代同台被消费。第三次收编的新特征：收编主体是平台算法，提取的不是歌而是'人设'与'场面'，独立音乐从生产方式变成人格标签。票房红利真实存在，代价也真实：livehouse的听众换血，来打卡的多过来听歌的。而记录权，仍然在综艺手里——节目组的剪辑就是这段历史的官方版本。", "f": "节目本体(爱奇艺2019-2023)；黄燎原、张守望等局内人访谈"}, {"t": "文娱领域治理", "s": 2021, "e": null, "r": "内地", "c": "政治", "m": "", "n": ""}, {"t": "流媒体与算法时代", "s": 2014, "e": 2026, "r": "内地", "c": "渠道", "m": "", "n": "第一个过剩合法被动的渠道；获取的身份成本归零；探索仪式感消失"}, {"t": "演出市场爆发与结构分化", "s": 2023, "e": 2026, "r": "内地", "c": "经济", "m": "", "n": "大型演唱会票房260亿+78%；中腰部livehouse下滑；场地大型化文旅化"}, {"t": "记录机制空格", "s": 2026, "e": null, "r": "内地", "c": "音乐", "m": "记录机制", "n": "内地线上这一格是空的；三次收编都发生在生态长出记录机制之前；TAI的结构位置", "d": "把五条线并排看：欧美在收编前建好了大学电台和独立榜单，日本把记录内化为档案习惯，台湾有金曲奖和公视《音乐万万岁》类的体制记录，香港有完整的工业存档。内地线上，1950年国家采录之后，民间的、持续的、专业的现场记录机制始终是空格——三次收编都发生在这个空格存在的前提下：因为没人记录，所以每次都由收编者书写历史。2026年，这个空格仍然开着。这就是苔上TAI的结构位置：不是做一个内容品牌，是补上一条线欠了七十年的那个器官。"}, {"t": "奴隶灵歌的密码功能", "s": 1800, "e": 1865, "r": "欧美", "c": "宗教", "m": "", "n": "圣歌暗藏逃亡路线与集会信号；Wade in the Water实为逃亡指南；宗教音乐第一次作为地下信息渠道"}, {"t": "Jesus Movement与基督摇滚", "s": 1967, "e": 1975, "r": "欧美", "c": "宗教", "m": "", "n": "反文化运动的宗教回流；嬉皮士皈依潮催生CCM当代基督教音乐产业"}, {"t": "Rastafari与雷鬼北上", "s": 1968, "e": 1981, "r": "欧美", "c": "宗教", "m": "", "n": "牙买加宗教运动的音乐输出；Bob Marley让一个小岛宗教成为全球反抗符号；影响英国朋克(Clash)"}, {"t": "海盗电台Radio Caroline", "s": 1964, "e": 1967, "r": "欧美", "c": "渠道", "m": "", "n": "北海船上非法电台对抗BBC垄断；青年音乐的法外渠道；1967海洋广播法取缔后DJ被BBC吸收"}, {"t": "Dead磁带交换网络", "s": 1971, "e": 1995, "r": "欧美", "c": "渠道", "m": "", "n": "Grateful Dead允许观众录音；乐迷磁带交换网络=乐队授权的分布式现场档案；TAI逻辑的民间先例", "d": "Grateful Dead从1971年起正式允许观众录音，甚至在场馆设taper专区。乐迷自发形成磁带交换网络：录音者义务复制、只换不卖、编号归档。结果：Dead的巡演上座率数十年全美最高——免费流通的现场录音成了最强的营销。这是TAI逻辑最重要的民间先例：现场记录的开放流通不侵蚀现场价值，反而放大它。区别在于Dead靠乐迷义务劳动，TAI要做的是给这套逻辑装上专业生产和确权结构。", "f": "David Gans等《This Is All a Dream We Dreamed》口述史；tapers社群档案etree.org"}, {"t": "Mixtape文化", "s": 1978, "e": 1995, "r": "欧美", "c": "渠道", "m": "", "n": "家用卡带让听众第一次能编辑音乐；嘻哈街头mixtape经济；个人策展的开端"}, {"t": "新兴宗教爆发期", "s": 1945, "e": 1955, "r": "日本", "c": "宗教", "m": "", "n": "神道真空后创价学会等疯长；宗教需求转入组织化新形态；1995奥姆是这条线的终点"}, {"t": "深夜放送文化", "s": 1967, "e": 1990, "r": "日本", "c": "渠道", "m": "", "n": "《整夜日本》（オールナイトニッポン）等深夜广播；青年亚文化的声音据点；乐手DJ化的传统由此建立"}, {"t": "唱片租赁店（貸しレコード）", "s": 1980, "e": 1989, "r": "日本", "c": "渠道", "m": "", "n": "黎明期唱片租赁店全国爆发；廉价聆听渠道冲击唱片业引发版权大战；日本特有的灰色渠道"}, {"t": "广播转录（エアチェック）文化", "s": 1975, "e": 1990, "r": "日本", "c": "渠道", "m": "", "n": "FM杂志刊登节目单乐迷定时录音；广播转录=个人档案化的日常实践；档案本能的大众根基", "d": "1970-80年代，FM杂志（《FM Fan》《周刊FM》）刊登精确到分钟的节目单，乐迷据此定时录音，自制卡带库，配自绘封面。'广播转录'（エアチェック，air check）成为一代人的日常仪式。它培养的不只是听众，是档案员——按表录音、编目、收藏的习惯，就是日本'分布式记录'生态的大众根基。记录不是某个机构的事业，是几百万人的习惯，这才是档案帝国的真正地基。"}, {"t": "长老教会与本土音乐保存", "s": 1865, "e": 2026, "r": "台湾", "c": "宗教", "m": "", "n": "教会罗马字保存台语；原住民部落诗班保存古调；体制外的语言与音乐存续机制"}, {"t": "庙口与那卡西走唱", "s": 1950, "e": 1985, "r": "台湾", "c": "渠道", "m": "", "n": "国语垄断媒体时代台语歌存活于庙会夜市走唱；宗教节庆空间=被压制音乐的庇护所", "d": "国语垄断广播电视的年代，台语歌活在体制照不到的地方：庙会酬神戏台、夜市、北投温泉的那卡西走唱。宗教节庆空间成为被压制音乐的庇护所——庙方要热闹，不管你唱什么语言。江蕙姐妹就是从北投那卡西唱出来的。这条规律五条线通用：当正式渠道关闭，音乐会退入仪式、市井与灰色地带存活，等待下一次开闸。"}, {"t": "美军电台AFNT", "s": 1954, "e": 1979, "r": "台湾", "c": "渠道", "m": "", "n": "驻台美军电台播摇滚爵士；台湾摇滚启蒙的主要声源；1979转型ICRT", "d": "1954年起，美军驻台广播电台AFNT全天播放美国流行乐、摇滚、乡村——为驻军服务，却被全岛青年偷听成音乐学校。台湾第一代摇滚乐手的耳朵是美军电台喂大的。1979年美军撤离，电台转型为ICRT延续至今。冷战驻军的文化副产品：军事存在走了，声音的殖民留下了——这个模式在日本（FEN电台）、韩国、菲律宾完全同构。"}, {"t": "翻版唱片时代", "s": 1960, "e": 1985, "r": "台湾", "c": "渠道", "m": "", "n": "台湾盗版黑胶闻名亚洲；廉价翻版=一代人的西方音乐教育；与内地打口带同构早三十年", "d": "1960-80年代台湾翻版黑胶闻名亚洲：西洋原盘进来，翻刻、印皮、上市，价格是原版零头。对唱片工业是盗版，对一代青年是唯一负担得起的音乐图书馆——台湾摇滚乐迷与乐手的西方音乐素养几乎全部建立在翻版上。1985年后美国贸易施压，台湾修著作权法清剿翻版，正版时代与唱片工业黄金期同步到来。与内地打口带完全同构，早三十年。"}, {"t": "神功戏与庙会音乐", "s": 1841, "e": 2026, "r": "香港", "c": "宗教", "m": "", "n": "酬神演出的粤剧粤曲传统；宗教节庆维持的表演经济；市井音乐的仪式根基"}, {"t": "丽的呼声有线广播", "s": 1949, "e": 1973, "r": "香港", "c": "渠道", "m": "", "n": "付费有线电台入户；粤曲天空小说时代；香港大众声音文化的第一个基础设施", "d": "1949年开播的付费有线电台，月费五元，喇叭箱接入千家万户。粤曲、天空小说（李我的单人广播剧）是全城共同的声音记忆。它是香港大众声音文化的第一个基础设施——在电视（1967）之前，整个城市的耳朵由它统一。粤语在娱乐工业里的根基地位由此奠定，二十五年后许冠杰的粤语流行革命，接的是这条有线的地气。"}, {"t": "夜总会歌厅体系", "s": 1950, "e": 1978, "r": "香港", "c": "渠道", "m": "", "n": "国语时代曲的生存空间；歌女驻唱经济；许冠杰出道前的工业底层"}, {"t": "民间信仰与庙会音乐", "s": 1800, "e": 1949, "r": "内地", "c": "宗教", "m": "", "n": "吹打班鼓乐社道教科仪音乐；音乐依附于仪式经济存活；1949后仪式断音乐被收编入民乐"}, {"t": "杨荫浏采录阿炳", "s": 1950, "e": null, "r": "内地", "c": "音乐", "m": "记录机制", "n": "民族音乐研究所钢丝录音机录下二泉映月半年后阿炳去世；国家主导的采录=收编与记录同体的原型；内地第一个记录机制由国家运营", "d": "1950年夏，中央音乐学院民族音乐研究所的杨荫浏、曹安和带钢丝录音机到无锡，录下阿炳六首曲目，包括《二泉映月》。阿炳数月后去世，六段钢丝成为绝响。这是内地第一个记录机制在运转——但它由国家学术机构运营，服务于'民族音乐遗产'的建构。收编与记录同体：保存了声音，也决定了声音被如何理解。内地此后七十年再没长出国家之外的现场记录机制，直到现在。", "f": "杨荫浏《瞎子阿炳小传》(1952)；中国艺术研究院音乐研究所档案"}, {"t": "智化寺京音乐采录", "s": 1953, "e": null, "r": "内地", "c": "宗教", "m": "", "n": "杨荫浏系统采录寺庙音乐；宗教音乐以学术档案形式幸存；信仰死了录音活着"}, {"t": "盗版VCD与摇滚录像", "s": 1995, "e": 2005, "r": "内地", "c": "渠道", "m": "", "n": "打口带的影像同代物；西方演唱会录像的盗版流通；一代乐手的现场启蒙全靠盗版画质"}, {"t": "校园BBS与早期乐评网络", "s": 1998, "e": 2006, "r": "内地", "c": "渠道", "m": "", "n": "水木清华新蜂音乐论坛；乐迷第一次线上聚集；豆瓣小组的前史"}, {"t": "美军政厅与解放空间", "s": 1945, "e": 1948, "r": "韩国", "c": "政治", "m": "", "n": "日殖音乐管制结束即入美军政；文化真空与左右对立"}, {"t": "朝鲜战争", "s": 1950, "e": 1953, "r": "韩国", "c": "政治", "m": "", "n": "废墟起点；战时慰问演出是仅存的音乐经济"}, {"t": "美八军舞台", "s": 1955, "e": 1970, "r": "韩国", "c": "渠道", "m": "", "n": "美军俱乐部演出体系=韩国流行乐的黄埔军校；申重铉Patti Kim皆出于此；与日本基地俱乐部台湾AFNT同构", "d": "朝鲜战争后驻韩美军基地俱乐部形成完整演出经济：试音分级、巡演排期、按级付酬——这是当时韩国唯一专业化的音乐工业。申重铉、Patti Kim、后来的很多制作人都在这里学会西方流行乐的全部技艺。与日本基地俱乐部、台湾AFNT电台构成东亚'驻军喂养起点'三连——三条线的现代流行乐都是美军的文化副产品。"}, {"t": "朴正熙政变与健全歌谣制度", "s": 1961, "e": 1979, "r": "韩国", "c": "政治", "m": "", "n": "宵禁长发取缔歌词审查；每张专辑强制收录健全歌谣"}, {"t": "申重铉与韩国迷幻摇滚", "s": 1964, "e": 1975, "r": "韩国", "c": "音乐", "m": "", "n": "韩国摇滚教父；Pearl Sisters金秋子体系；本土迷幻自成一格", "f": "Light in the Attic厂牌申重铉再版系列liner notes(2011)"}, {"t": "大麻波动·摇滚斩首", "s": 1975, "e": null, "r": "韩国", "c": "政治", "m": "", "n": "申重铉拒为朴正熙写颂歌后以大麻罪入狱；乐手成批禁演；摇滚被政权物理性斩首", "d": "1975年，申重铉拒绝为朴正熙创作颂歌，随即以大麻罪名被捕，同案波及数十名乐手：入狱、禁演、作品下架。韩国摇滚被政权物理性斩首，此后十余年主流只剩trot与'健全歌谣'。与台湾的禁歌审查相比，韩国的手段更直接——不审查作品，直接消灭作者。1980年代末摇滚复苏时，断层已经形成：韩国没有'摇滚一代'，直接跳到了徐太志。"}, {"t": "大学歌谣祭体系", "s": 1977, "e": 1990, "r": "韩国", "c": "渠道", "m": "", "n": "MBC大学歌谣祭等选拔通道；审查时代的合法出口；民谣与校园乐队的温床"}, {"t": "光州与民众歌谣运动", "s": 1980, "e": 1987, "r": "韩国", "c": "音乐", "m": "", "n": "光州事件后노래운动在大学地下兴起；金光石一代用民谣承载民主化；与台湾党外歌曲同构"}, {"t": "六月民主化宣言", "s": 1987, "e": null, "r": "韩国", "c": "政治", "m": "", "n": "与台湾解严同年；审查松动文化爆发"}, {"t": "徐太志与孩子们", "s": 1992, "e": 1996, "r": "韩国", "c": "音乐", "m": "", "n": "说唱金属舞曲砸进歌谣界三年改写市场后在顶点解散；断代点：Seo Taiji前/后", "d": "1992年出道舞台上评委给出全场最低分，随后专辑卖出170万张。说唱+金属+舞曲的混合物三年内改写韩国音乐市场的年龄结构：青少年第一次成为消费主体。1996年在顶点宣布解散——'我们想在最美的时刻停下'。断代意义：韩国流行乐从此以Seo Taiji为界分前后。成员梁铉锡随后创办YG——地下能量的携带者亲手建立了偶像工业，收编者与被收编者第一次是同一个人。"}, {"t": "三大社与练习生制度", "s": 1995, "e": 2026, "r": "韩国", "c": "经济", "m": "收编时刻", "n": "SM YG JYP确立选拔封闭训练出道体系；先发制人的收编：不等地下长出直接工业化生产音乐人；地下被永久降格为人才水库", "d": "SM(1995)、JYP(1997)、YG(1998)确立练习生体系：全国选拔、封闭训练数年、出道后以收入偿还训练成本。这是收编类型学的终极形态——先发制人的收编：不等地下场景长出能量再提取，直接从青少年阶段开始工业化生产'音乐人'。地下被永久降格为人才水库与风格试验田。内地选秀工业2018年后全盘移植此模型——这是内地线最需要警惕的未来剧本。", "f": "John Lie《K-pop: Popular Music, Cultural Amnesia, and Economic Innovation in South Korea》(2015)"}, {"t": "金融危机与文化立国", "s": 1997, "e": 1999, "r": "韩国", "c": "经济", "m": "", "n": "IMF危机后文化产业振兴基本法；国家资本直接下场；K-pop=政府财阀娱乐公司三位一体出口工程", "d": "1997年IMF危机重创财阀经济，金大中政府提出'文化立国'：1999年《文化产业振兴基本法》，政府基金直接投资娱乐公司，出口目标写入国策。K-pop由此成为政府-财阀-娱乐公司三位一体的国家出口工程——五条线（现在六条）里国家资本介入最深、最成功的案例。台湾的补贴是养生态，韩国的投资是造武器，同为国家介入，目的完全不同。", "f": "Euny Hong《The Birth of Korean Cool》(2014)"}, {"t": "弘大朋克与俱乐部场景", "s": 1994, "e": 2010, "r": "韩国", "c": "音乐", "m": "", "n": "Drug俱乐部Crying Nut No Brain；朝鲜朋克自称Chosun Punk；偶像工业阴影下的地下"}, {"t": "江南Style全球爆红", "s": 2012, "e": null, "r": "韩国", "c": "经济", "m": "", "n": "K-pop全球管道验证时刻；YouTube算法时代第一个非英语顶流"}, {"t": "BTS与粉丝平台工业", "s": 2013, "e": 2026, "r": "韩国", "c": "经济", "m": "", "n": "粉丝经济平台化(Weverse)；人的工业推到全球顶点；防弹前/后K-pop估值逻辑改变"}, {"t": "K-indie借管道出海", "s": 2016, "e": 2026, "r": "韩国", "c": "音乐", "m": "", "n": "hyukoh wave to earth海外听众超国内；小场景借大工业修好的全球管道走出去；水库的一条出路", "d": "hyukoh、wave to earth、Se So Neon这批乐队的Spotify海外听众超过国内——他们没有对抗偶像工业，而是搭乘K-pop用二十年修好的全球分发管道（算法歌单、K-content消费群、YouTube生态）出海。水库的一条意外出路：大工业修的路，小场景也能走。对内地独立音乐的启示直接而残酷：出海管道是别人修好的时候，你的邻居是谁很重要。"}, {"t": "偶像工业之后：水库能否资本化", "s": 2026, "e": null, "r": "韩国", "c": "音乐", "m": "", "n": "开放问题：地下被锁死在人才水库位置数十年后indie自身能否建立资本化通道；K-indie出海是答案的开头吗"}, {"t": "演出停摆与行业筛选", "s": 2020, "e": 2022, "r": "内地", "c": "经济", "m": "", "n": "三年停摆场地批量死亡；活下来的多为连锁化资本化场地；行业结构被动出清", "d": "2020-2022三年间演出反复停摆，中小livehouse批量死亡，活下来的多为连锁化、有资本储备的场地——行业结构被一场外力被动出清。MAO的多城市连锁形态恰是幸存者画像。筛选的另一面：停摆期积压的乐队与观众，构成2023年爆发的势能。危机不创造格局，只是加速格局。"}, {"t": "线上直播与云现场实验", "s": 2020, "e": 2022, "r": "内地", "c": "渠道", "m": "", "n": "停摆期的形态变异尝试；打赏模式无法覆盖成本；未完成的实验留下基础设施与习惯"}, {"t": "报复性演出与音乐节泡沫", "s": 2023, "e": 2024, "r": "内地", "c": "经济", "m": "", "n": "票房爆发供给过剩票价通胀；随后音乐节批量取消潮；文旅资本快进快出", "d": "2023年演出市场报复性爆发，音乐节数量与票价同时通胀，文旅资本快进快出；2024年下半年起音乐节批量取消、中腰部livehouse票房下滑——泡沫一年即见顶。结构启示：靠积压需求的爆发不可持续，行业真正缺的是让观众持续回来的理由——内容资产，而非档期供给。这正是TAI论证的行业语境。"}, {"t": "选秀与练习生模式引进", "s": 2005, "e": 2026, "r": "内地", "c": "经济", "m": "", "n": "超级女声开端偶像练习生完成韩式移植；韩国先发制人收编模型的内地复制；与livehouse生态争夺同一批年轻人"}, {"t": "《同一首歌》与晚会工业", "s": 2000, "e": 2009, "r": "内地", "c": "经济", "m": "", "n": "收编后的能量去向：体制晚会消化一批摇滚人；崔健拒绝上晚会成为身份声明"}, {"t": "小红书成为乐迷聚集地", "s": 2022, "e": 2026, "r": "内地", "c": "渠道", "m": "", "n": "豆瓣式微后新的乐迷聚集与种草渠道；演出信息与现场体验的图文化；渠道带最新一格"}, {"t": "网易云腾讯音乐人体系", "s": 2016, "e": 2026, "r": "内地", "c": "经济", "m": "", "n": "平台直接签约独立音乐人的基础设施；免中介也免议价；平台收编的日常化形态"}, {"t": "AI生成音乐与风格考古", "s": 2023, "e": 2026, "r": "内地", "c": "渠道", "m": "", "n": "Suno类工具进入创作与听觉日常；算法与AI反向介绍灵歌放克等风格谱系给内地听众；风格教育的新渠道与作者性危机并存", "d": "Suno类工具让生成一首完整歌曲的成本趋近于零，产量趋于无限而注意力恒定——音乐作为录音的稀缺性彻底终结。同时发生的反向运动：算法与AI以'风格考古'的方式把灵歌、放克、Motown、City Pop的谱系介绍给内地听众，一代人正在通过机器补上被历史跳过的听觉教育。作者性危机与风格启蒙同时到来——这个渠道格的双面性在六条线上都是第一次。"}, {"t": "方大同去世", "s": 2025, "e": null, "r": "内地", "c": "音乐", "m": "", "n": "华语R&B灵魂乐最重要的布道者离世；其作品是无数内地听众接触灵歌福音传统的入口；离世引发的重听潮本身成为一次风格再教育", "d": "2025年2月，方大同因病去世，年41岁。他是华语世界最执着的灵魂乐布道者——《Soulboy》到《梦想家》，二十年把R&B、灵歌、放克的语法系统性译入华语。离世引发的重听潮让无数内地听众第一次追溯到Marvin Gaye、Stevie Wonder的源头——一次由哀悼驱动的风格再教育。他证明的事：风格的引入需要一个可信的身体作为容器，这是AI考古替代不了的部分。"}, {"t": "Motown厂牌帝国", "s": 1959, "e": 1988, "r": "欧美", "c": "经济", "m": "", "n": "Berry Gordy底特律建立黑人拥有的厂牌；被提取者自建工业的最重要反例；写歌制作艺人开发全内部化", "d": "1959年Berry Gordy以800美元家庭借款在底特律创办，把福特流水线方法用于音乐：内部写歌团队(Holland-Dozier-Holland)、内部制作、艺人礼仪学校、质量控制会议。1960年代成为美国最大黑人拥有企业——被提取者自建工业的最重要反例：黑人音乐的能量第一次由黑人资本组织并获益。对你收编模型的修正：提取不是宿命，工业能力可以被夺回。TAI某种意义上就是Motown问题的现场版：记录的工业能力归谁。", "f": "Berry Gordy自传《To Be Loved》；Nelson George《Where Did Our Love Go?》"}, {"t": "嘻哈在布朗克斯诞生", "s": 1973, "e": null, "r": "欧美", "c": "音乐", "m": "", "n": "DJ Kool Herc街区派对；从街区到全球最大音乐类型的完整地下-收编循环；mixtape经济与采样法律战皆源于此", "d": "1973年8月，DJ Kool Herc在布朗克斯Sedgwick大道1520号的派对上延长break段落——嘻哈的技术起点。此后二十年完成从街区派对到全球最大音乐类型的完整循环：mixtape地下经济、厂牌收编、采样法律战(1991年Biz Markie案后采样从自由文化变为授权经济)。嘻哈线浓缩了你模型的全部议题：地下自建渠道、被收编、以及记录与版权的战争。2017年《中国有嘻哈》提取的正是这条线四十年积累的语法。", "f": "Jeff Chang《Can't Stop Won't Stop: A History of the Hip-Hop Generation》(2005)"}, {"t": "AI生成音乐爆发", "s": 2023, "e": 2026, "r": "欧美", "c": "经济", "m": "", "n": "Suno Udio等文本生成音乐；产量趋于无限而注意力恒定；音乐的稀缺性从录音彻底转向在场"}, {"t": "真实现场是否最后的稀缺品", "s": 2026, "e": null, "r": "欧美", "c": "音乐", "m": "", "n": "开放问题：AI内容无限供给时代身体在场成为唯一不可生成之物；五条线共享的终极问题也是现场记录价值的最终依据", "d": "AI让录音的边际成本归零后，音乐价值链上唯一不可生成的环节是身体在场——错误、汗水、同一空间的集体体温。如果这个假设成立，现场及其高质量记录将成为整个行业最后的稀缺资产：稀缺的不是声音，是'它真的发生过'的证明。这是六条线共享的终极问题，也是TAI全部价值假设的最深依据——记录现场，就是在为'真实'建立产权。"}, {"t": "卡拉OK的发明", "s": 1971, "e": null, "r": "日本", "c": "经济", "m": "", "n": "井上大佑发明伴奏机未申请专利；人人都是表演者；日本对全球音乐消费方式最大单一贡献；与livehouse一体两面", "d": "1971年，神户乐手井上大佑为无法到场的伴奏需求造出投币伴奏机，未申请专利。卡拉OK把'表演'从专业者手里交还给所有人——与livehouse是一体两面：一个让普通人上台，一个让乐队有台可上。它也是日本对全球音乐消费方式最大的单一贡献，在东亚尤其重塑了音乐的社交属性：唱比听更重要。内地KTV产业、直播间连麦文化都是它的远代后裔。"}, {"t": "档案帝国的老龄化", "s": 2026, "e": null, "r": "日本", "c": "音乐", "m": "", "n": "开放问题：分布式记录生态依赖的中古店场刊乐迷正在老去；习惯型档案能否传给流媒体世代"}, {"t": "闪灵与金属外交", "s": 2016, "e": null, "r": "台湾", "c": "音乐", "m": "", "n": "主唱Freddy当选立法委员；金属乐队直接进入政治体制五条线独一份；音乐人参政的极限样本", "d": "闪灵乐团用黑金属处理台湾史二十年，主唱Freddy林昶佐2016年当选立法委员，任内仍随团巡演——金属乐手在国会质询与音乐节嘶吼之间切换。六条线里音乐人直接进入政治体制的独一样本。它的结构条件恰是台湾线的全部特征：身份政治需要文化代言人+制度旋转门真实存在。这个样本不可移植，但它标出了'音乐-政治'关系光谱的一个极点。"}, {"t": "补贴之后还有野生代吗", "s": 2026, "e": null, "r": "台湾", "c": "音乐", "m": "", "n": "开放问题：补助体系养育一代后申请表逻辑之外还能否长出野生场景；慢性收编的长期代价待验证"}, {"t": "离散能否凝成海外港乐", "s": 2026, "e": null, "r": "香港", "c": "音乐", "m": "", "n": "开放问题：散落台北伦敦多伦多的香港音乐人能否形成有身份的diaspora场景；参照犹太与古巴离散音乐史"}, {"t": "Bad News厂牌与亚洲通道", "s": 1989, "e": 2026, "r": "日本", "c": "经济", "m": "", "n": "东京独立厂牌；签Quruli与中国脑浊发行500+张；2011起制作Summer Sonic亚洲舞台送中国乐队登日；千叶和利的通道事业", "d": "千叶和利1989年在东京创立的独立厂牌，签过Quruli，也签下中国的脑浊——发行超过500张唱片。2011年起制作Summer Sonic的Asian Calling舞台，把重塑、后海大鲨鱼、逃跑计划送上日本最大音乐节。他的事业本质是'通道'：让声音跨越国境被听见——MAO是这条通道在北京的落地物。"}, {"t": "小酒馆（成都）", "s": 1997, "e": 2026, "r": "内地", "c": "场地", "m": "", "n": "玉林西路；场地+厂牌+文化公司三位一体；西南场景的孤独起点；后因《成都》一歌被大众化", "d": "1997年开在玉林西路，比北京livehouse元年早十年，集场地、厂牌、文化公司于一体——西南独立音乐几乎是它一家养起来的。2017年赵雷一首《成都》让它变成打卡景点——一个地下据点被一首民谣歌曲大众化，是收编的最温柔形态。"}, {"t": "忙蜂与嚎叫：摇滚酒吧时代", "s": 1996, "e": 2003, "r": "内地", "c": "场地", "m": "", "n": "livehouse前史：忙蜂酒吧与五道口嚎叫俱乐部；无聊军队朋克场景的物理据点；设备简陋但让地下有了固定舞台", "d": "livehouse这个词进入中国之前，地下音乐活在摇滚酒吧里：忙蜂、五道口的嚎叫俱乐部。设备简陋、执照模糊，但无聊军队的朋克合辑场景、树村乐队最早的城里演出都发生在这些地方。它们是MAO们的前史——先有将就的舞台，才谈得上专业的舞台。"}, {"t": "豪运与金属据点时代", "s": 2000, "e": 2010, "r": "内地", "c": "场地", "m": "", "n": "东直门豪运酒吧与五道口13 Club；重金属场景的稳定巢穴；证明细分风格可以养活专门场地", "d": "东直门的豪运酒吧与五道口的13 Club是2000年代北京重金属场景的稳定巢穴——在摇滚整体失语的年代，金属靠自己的忠诚度养活了专门场地。它们证明的命题对今天仍然有效：细分风格的深度社群，比泛化的大流量更能支撑一个空间活下去。"}, {"t": "愚公移山开业", "s": 2004, "e": 2026, "r": "内地", "c": "场地", "m": "", "n": "从台球厅跨界的北京早期livehouse；2008年一年290场；长期自主办演出自负盈亏的独立据点", "d": "吕志强把工体附近一家台球厅改成演出空间，2004年开业，2008年一年做了290场。二十年自主办演出、自负盈亏，不引入外部资本——在连锁化时代它是另一种答案的活标本：不做大，只做久。", "f": "音乐财经livehouse二十年系列报道(2019)"}, {"t": "育音堂（上海）", "s": 2004, "e": 2026, "r": "内地", "c": "场地", "m": "", "n": "张海生创办；上海本土原创音乐场地；重塑刺猬万青年轻时都曾登台；小场地作为乐队摇篮的上海样本", "d": "张海生2004年创办，上海本土原创音乐的主场。重塑、万青、刺猬年轻时都从这里的小台上走过——小场地的价值不在票房，在于它是乐队的第一级台阶。二十年后它仍是三四百人的规模：有些机构的正确尺寸就是不长大。", "f": "音乐财经论坛实录《一家Livehouse的立身之本》(2024)"}, {"t": "School酒吧", "s": 2010, "e": 2026, "r": "内地", "c": "场地", "m": "", "n": "五道营胡同；刘非刘昊创办；社会一团糟只有来学校；年轻乐队的第一站；小而清晰的立场型场地", "d": "2010年刘非、刘昊开在五道营胡同，口号'社会一团糟，只有来学校'。两百人的小空间专收最年轻的乐队——它接替了嚎叫和D-22的生态位：永远给还不值钱的音乐留一个门。北京地下的代际传递靠这类空间完成。"}, {"t": "DDC黄昏黎明俱乐部", "s": 2014, "e": 2026, "r": "内地", "c": "场地", "m": "", "n": "张锦灿创办；最早以互联网思维运营的livehouse之一；线下场景线上化的先行实验"}, {"t": "世纪乐梦收购MAO品牌", "s": 2016, "e": null, "r": "内地", "c": "经济", "m": "", "n": "与日方完成品牌收购；结束京沪品牌归属之争；开启全国院线化布局至10城15店；livehouse连锁化时代的标志动作", "d": "2016年1月，世纪乐梦（北京）文化传媒有限公司与日本方完成MAO品牌收购，结束了此前京沪两地的品牌归属混乱，随后启动全国院线化布局，至今覆盖10余城。这是内地livehouse行业连锁化时代的标志动作——也是这张图的作者一家进入这条时间线的时刻。", "f": "界面新闻《疆进酒、愚公移山、Mao的兴衰背后，中国livehouse二十年进化史》(2019)"}, {"t": "CBGB（纽约）", "s": 1973, "e": 2006, "r": "欧美", "c": "场地", "m": "", "n": "Bowery街朋克产房；Ramones Television Patti Smith从这里出发；2006年死于租金纠纷原址变成奢侈品男装店", "d": "Hilly Kristal 1973年开在Bowery流浪汉街区，本想做乡村蓝草酒吧（CBGB即Country, BlueGrass, Blues），结果Television、Ramones、Patti Smith、Talking Heads把它变成朋克与新浪潮的产房。规则只有一条：必须演原创。2006年死于租金纠纷，原址成为John Varvatos奢侈男装店，店内保留涂鸦墙作装饰——空间驱逐史上最完整的讽刺：反叛的尸体被制成时尚的标本。", "f": "纪录片《Burning Down the House: The Story of CBGB》(2009)"}, {"t": "新宿LOFT", "s": 1976, "e": 2026, "r": "日本", "c": "场地", "m": "", "n": "日本livehouse活化石半世纪不辍；从民谣转向摇滚朋克；东京地下的中央车站", "d": "1976年开业至今半世纪不辍，从民谣咖啡起步转向摇滚朋克，几乎所有日本地下系谱都从它的台上经过。它是日本场地'不死'现象的旗舰样本：低租金结构、社群忠诚、代际传递的店长制。对照CBGB的死与鼓楼MAO的迁，LOFT回答的问题是：场地长寿不是运气，是制度。", "f": "《ROOFTOP》(LOFT官方志)；平野悠《ライブハウス「ロフト」青春記》"}, {"t": "弘大Drug（首尔）", "s": 1994, "e": 2004, "r": "韩国", "c": "场地", "m": "", "n": "朝鲜朋克产房Crying Nut驻场；偶像工业阴影下地下场景的第一个物理据点；后关闭", "d": "1994年开在弘大地下，Crying Nut、No Brain驻场，'朝鲜朋克'（Chosun Punk）在这里自我命名。它是偶像工业阴影下地下场景的第一个物理据点——证明即使在练习生制度的国度，只要有一间地下室，朋克照样发生。2000年代关闭，但它孵化的乐队至今仍在演。"}, {"t": "VOX（武汉）", "s": 2005, "e": 2026, "r": "内地", "c": "场地", "m": "", "n": "朋克之城的心脏；生命之饼系谱；武汉地下二十年的物理载体", "d": "2005年开业，生命之饼主唱吴维参与创办，武汉'朋克之城'名声的物理载体。二十年间它是这座城市地下音乐几乎唯一的恒定坐标——一个场地撑起一座城的场景，VOX是内地这个命题最极端的样本。"}, {"t": "B10现场（深圳）", "s": 2012, "e": 2026, "r": "内地", "c": "场地", "m": "", "n": "华侨城创意文化园；策展型运营先例；园区与场地共生的深圳样本（约2012年前后专业化运营）"}, {"t": "斯普林斯汀东柏林公演", "s": 1988, "e": null, "r": "欧美", "c": "音乐", "m": "", "n": "30万东德人到场；我来是给你们演摇滚乐；次年墙倒；现场的政治能量最极端的实证", "d": "1988年7月19日，东德当局为疏导青年不满批准了这场演出，30万人涌入（一说更多）。Springsteen用德语念了一段声明：'我来这里不是支持或反对任何政府，我来给你们演摇滚乐——怀着有一天所有壁垒被推倒的希望。'十六个月后墙倒，历史学家至今争论这场演出的作用。冷战用音乐做了四十年武器，临门一脚是一场现场——'它真的发生过'的力量，没有比这更大的实证。"}, {"t": "牙买加声音系统与Dub散播", "s": 1954, "e": 1985, "r": "欧美", "c": "渠道", "m": "", "n": "移动音响+DJ喊麦+版本翻做；Kool Herc的技术母体；DJ文化嘻哈与英国低音谱系的共同祖先", "d": "1950年代金斯敦的移动音响系统：卡车拉着自制音箱在街区放唱片，selector选曲、deejay喊麦、工程师做dub版本翻做——DJ文化的全部要素在牙买加街头就位。1967年少年Clive Campbell随移民潮到布朗克斯，六年后以DJ Kool Herc之名把这套技术变成嘻哈。英国的低音谱系（dub-jungle-grime）是它的另一个孩子。一个小岛的街头技术成为两大洲音乐的母体——渠道史上最高产的一次迁移。"}, {"t": "锐舞与刑事司法法案", "s": 1988, "e": 1994, "r": "欧美", "c": "政治", "m": "", "n": "仓库锐舞的第二个爱之夏；1994年英国立法定义重复性节拍并授权驱散——法律条文写入音乐风格的空间驱逐极端案例", "d": "1988-92年英国仓库与旷野锐舞被称为'第二个爱之夏'，青年在法外空间彻夜跳舞。1994年《刑事司法与公共秩序法》给出回应：法律明文定义'以重复性节拍为特征的音乐'并授权警方驱散——一种音乐风格被写进法律条文，空间驱逐史上最赤裸的一页。后果是锐舞合法化进入俱乐部执照体系：驱逐再一次没有消灭能量，只是给它换了容器。"}, {"t": "视觉系与自建动员体系", "s": 1985, "e": 2005, "r": "日本", "c": "音乐", "m": "", "n": "X Japan起点；妆容+私设歌迷会+独立发行；不经主流媒体自建动员的完整平行工业", "d": "X Japan从1980年代起示范了一套完整的平行工业：极端妆容制造辨识度、私设歌迷会直连受众、独立厂牌Extasy发行、不经主流媒体自建动员——最终以'非主流'身份攻入武道馆和东京巨蛋。视觉系证明的命题：动员体系可以完全自建，主流媒体不是必经之路。这是前互联网时代的'私域流量'完全体，也是日本'平行宇宙'逻辑最商业化的成功。"}, {"t": "校园民谣与《同桌的你》", "s": 1994, "e": 1996, "r": "内地", "c": "音乐", "m": "", "n": "老狼高晓松大地唱片；台湾校园民歌的内地回声晚了十八年；红磡同年的另一条主流化路径", "d": "1994年大地唱片《校园民谣1》，老狼《同桌的你》横扫全国——台湾校园民歌的内地回声，迟到十八年。与红磡同年：同一年里，摇滚在香港加冕，民谣在校园登顶——内地音乐市场的两条主流化路径同时冲线。校园民谣的速朽（热潮三年即退）也预演了内地市场的节奏：每种声音的窗口期都比别处短。"}, {"t": "万能青年旅店与地方叙事", "s": 2010, "e": null, "r": "内地", "c": "音乐", "m": "", "n": "石家庄；杀死那个石家庄人；二线城市叙事第一次成为独立音乐的中心文本；地方性作为美学立场", "d": "2010年同名专辑，石家庄——'杀死那个石家庄人'让一座二线工业城市第一次成为独立音乐的中心文本。此前内地摇滚的地理叙事只有北京（及作为他者的外省）；万青之后，地方性本身成为美学立场，为后来五条人（海丰）、九连真人（连平）的方言与县城叙事开了路。去中心化的第一声。"}, {"t": "Disco清除之夜", "s": 1979, "e": null, "r": "欧美", "c": "政治", "m": "", "n": "芝加哥棒球场焚烧disco唱片引发骚乱；摇滚乐迷对黑人与同志舞曲的反扑；音乐史上最著名的带种族色彩的清除仪式", "d": "1979年7月12日，芝加哥Comiskey球场，电台DJ Steve Dahl组织'Disco Demolition Night'：带一张disco唱片入场只收98美分，中场把上万张唱片装箱炸毁，随后数千人冲入球场骚乱。表面是摇滚乐迷对disco泛滥的反感，内里是对黑人与同志舞曲文化的反扑——被烧的唱片里大量根本不是disco，只是黑人音乐。它标出一个规律：每当边缘文化占领主流渠道，反扑都以'品味'之名进行。"}, {"t": "Live Aid全球直播", "s": 1985, "e": null, "r": "欧美", "c": "经济", "m": "", "n": "温布利+费城双现场19亿人收看；现场演出第一次成为全球媒体事件；慈善直播工业的起点", "d": "1985年7月13日，温布利与费城双现场，卫星连线全球直播，约19亿人收看。Queen的21分钟被反复评为史上最伟大现场段落。它开创的不只是慈善模式，而是'现场作为全球媒体事件'——演出的价值第一次主要发生在不在场的人身上。这是现场直播化的起点，也是'在场'与'观看'分离的起点：TAI面对的整个问题域从这一天开始成形。"}, {"t": "打歌节目体系", "s": 1981, "e": 2026, "r": "韩国", "c": "渠道", "m": "", "n": "音乐银行人气歌谣等电视打歌台；每周排名+回归制度；K-pop工业的媒体基础设施与节奏发生器", "d": "1981年《音乐银行》类电视打歌节目起步，逐渐形成每周排名、回归（comeback）周期、一位（第一名）颁奖的完整制度。它是K-pop工业的节奏发生器：艺人按打歌周期生产、粉丝按投票规则动员——媒体不只是渠道，是把整个行业的时间表都规定了。内地选秀移植了练习生，却没有移植这个每周节拍器，这个缺环解释了两地偶像工业成熟度的差距。"}, {"t": "草地音乐会风潮", "s": 1985, "e": 1991, "r": "内地", "c": "音乐", "m": "", "n": "北大清华草坪诗朗诵结合吉他弹唱围成大歌会；校园民谣的上游；崔健以在北大草坪献唱为荣；1994《没有围墙的校园》与围墙拆除同年"}, {"t": "轻音部与学园祭文化", "s": 1970, "e": 2026, "r": "日本", "c": "音乐", "m": "", "n": "校园音乐社团化建制化；不通向唱片工业而通向livehouse体系；乐队文化的义务教育与小场地生态的蓄水池"}, {"t": "香港校园与青年地下", "s": 2020, "e": 2026, "r": "香港", "c": "音乐", "m": "", "n": "审查收紧后新一代转入低可见度模式；校园与青年场景的独立能量在积累；地下模式的当代再生（低调场景公开资料有限）"}];
const LINKS = [{"a": "上海时代曲工业", "b": "上海时代曲工业南迁", "type": "solid", "t": "同一个工业的断裂与续命", "d": "1949年，黎锦晖体系的作曲家、歌手、唱片资本整体迁港：姚敏、陈蝶衣、李厚襄南下，百代唱片香港复业。国语时代曲在香港延续二十年，直到粤语歌革命。华语流行工业的基因是上海的，香港只是它的第二具身体。"}, {"a": "冷战音乐外交", "b": "短波电台偷听", "type": "dash", "t": "同一场声音冷战的两端", "d": "美国之音的爵士与摇滚节目是国务院的意识形态出口，铁幕与竹幕后的偷听者是它的目标受众。苏联的骨碟、中国的敌台偷听、日台的美军电台——整个东亚地下音乐启蒙都是这场声音冷战的副产品。"}, {"a": "美军电台AFNT", "b": "美军占领与基地俱乐部", "type": "dash", "t": "驻军文化输出的同构", "d": "日本的FEN电台与美军俱乐部、台湾的AFNT：同一套军事存在的文化副产品，各自成为当地摇滚启蒙的主要声源。军队走了，声音的殖民留下——菲律宾、韩国、冲绳完全同构。"}, {"a": "翻版唱片时代", "b": "打口带时代", "type": "dash", "t": "盗版作为音乐教育的同构", "d": "台湾翻版黑胶（1960-85）与内地打口带（1992-2004）：都是廉价、半非法、随机的西方音乐图书馆，都养大了各自的摇滚一代，都随正版化/流媒体化终结。台湾早了三十年——内地文化进程与台湾的时间差在这条连接上最直观。"}, {"a": "滚石飞碟黄金期", "b": "魔岩唱片进京", "type": "solid", "t": "台湾工业资本北上", "d": "魔岩是滚石的子公司，张培仁带着台湾二十年积累的企划、制作、包装方法进京。内地摇滚的黄金期是台湾工业能力的输出品——这条线是1990年代三地音乐资本大流动的主动脉。"}, {"a": "魔岩唱片进京", "b": "红磡中国乐势力", "type": "solid", "t": "台湾企划·内地乐队·香港舞台", "d": "1994年红磡是三条线的物理交点：台湾资本企划、内地乐队演出、香港场馆与观众。一场演唱会同时属于三条时间线——也同时暴露了内地线自身生态的空洞：楼是租的。"}, {"a": "livehouse制度与保底制（ノルマ制）诞生", "b": "MAO鼓楼开业", "type": "solid", "t": "千叶和利：制度的搬运人", "d": "MAO的日方创始人千叶和利把日本livehouse的运营制度（含保底制逻辑）直接带进鼓楼。内地livehouse行业的名字和底层规则都源自日本线——MAO是这条制度输送线的登陆点。"}, {"a": "关西民谣（フォーク）与新宿西口集会", "b": "树村拆迁", "type": "dash", "t": "空间驱逐的同构", "d": "新宿西口清场（1969，广场被改名为通路）、树村拆迁（2003）、鼓楼改造（2015）、Hidden Agenda驱逐（2009-2020）：城市权力用不同名义（交通、规划、消防、地契）驱逐音乐空间，能量每次都流向新形态。这是五条线共享的固定主题。"}, {"a": "Hidden Agenda驱逐编年", "b": "鼓楼改造MAO离开", "type": "dash", "t": "空间驱逐的同构（续）", "d": "同一条空间政治规律的香港版与北京版：租金与法规是最有效的审查形式，不禁止音乐，只让音乐无处发生。"}, {"a": "手抄歌本与知青歌曲", "b": "苏联骨碟bone music", "type": "dash", "t": "高压下的地下载体同构", "d": "苏联人把摇滚刻在废X光片上，中国知青把歌抄在笔记本里：介质不同，机制相同——获取成本极高，因此筛选极严、绑定极深。冷战地下传播学的两个经典样本。"}, {"a": "校园民歌运动", "b": "西北风与文化热", "type": "dash", "t": "身份危机的音乐化：两岸镜像", "d": "台湾1976（退出联合国后问我们自己的歌在哪里）与内地1986（文化热中问我们是谁）：相隔十年的同构运动，都是身份危机催生的音乐爆发，都为随后的工业黄金期储备了人才。"}, {"a": "许冠杰鬼马双星", "b": "林强向前走", "type": "dash", "t": "母语翻身的同构", "d": "粤语1974年经许冠杰翻身，台语1990年经林强翻身：被视为市井低俗的母语进入流行主流，都是本土意识的声音信号。语言的翻身永远早于或伴随政治身份的翻身。"}, {"a": "Nevermind收编时刻", "b": "乐队的夏天", "type": "dash", "t": "收编剧本的跨洋重演", "d": "1991年大厂牌用支票扫荡美国地下，2019年综艺平台用流量扫荡内地地下：提取方式从签约变成人设剪辑，但结构相同——地下多年积累的能量与语汇被一次性变现，收益归提取方。区别在于欧美收编前记录机制已就位，内地没有。"}, {"a": "MTV Unplugged开播", "b": "记录机制空格", "type": "dash", "t": "就位与缺席", "d": "Unplugged在收编前夜（1989）就位，成为收编时代的真实性认证机构；内地线三次收编过去，这个位置仍是空格。这条虚线连接的是一个存在和一个缺席——也是苔上TAI全部论证的视觉形式。"}, {"a": "Dead磁带交换网络", "b": "记录机制空格", "type": "dash", "t": "民间先例与待建机制", "d": "Grateful Dead授权乐迷录音流通，证明现场记录的开放流通放大而非侵蚀现场价值。TAI是这个民间逻辑的专业化版本：加上生产标准与版权确权。这条线是空格最该参考的答案之一。"}, {"a": "杨荫浏采录阿炳", "b": "民间音乐国家化", "type": "solid", "t": "记录与收编同体", "d": "采录阿炳与民歌采集运动是同一个工程的两面：国家民族音乐建构。内地第一个记录机制由收编者本人运营——记录权归属问题从1950年就定了调，此后七十年未变。"}, {"a": "广播转录（エアチェック）文化", "b": "中古唱片店与档案帝国", "type": "solid", "t": "档案习惯的大众根基", "d": "几百万人按节目单定时录音、编目、收藏的日常，长成了Disk Union体系和全社会的档案本能。分布式记录不是机构建的，是习惯养的——这是TAI长期形态的一个参考答案。"}, {"a": "朋克爆发", "b": "无聊军队朋克场景", "type": "dash", "t": "DIY逻辑的迟到登陆", "d": "伦敦1976的生产方式宣言，1996年前后经打口带和地下杂志登陆北京：无聊军队合辑是内地第一次完整实践自己录、自己出、自己卖。迟到二十年，但机制原样复制。"}, {"a": "新兴宗教爆发期", "b": "阪神大地震与奥姆沙林事件", "type": "solid", "t": "精神真空的起点与内爆", "d": "1945年神道崩溃后新兴宗教疯长，1995年奥姆以沙林毒气袭击社会：同一个精神真空的开端与终局。日本文化的去政治化、地下音乐的内向修行，都在这两点之间展开。"}, {"a": "民间信仰与庙会音乐", "b": "庙口与那卡西走唱", "type": "dash", "t": "仪式空间作为音乐庇护所", "d": "内地1949年前的庙会音乐经济与台湾戒严期的庙口走唱：宗教节庆空间收留被正式渠道排斥的音乐。当渠道关闭，音乐退入仪式与市井存活——五条线通用的规律。"}, {"a": "群星会与国语流行", "b": "邓丽君走私磁带", "type": "solid", "t": "邓丽君：一个人就是一条走私线", "d": "邓丽君是台湾群星会时代培养的歌手，她的磁带经港澳走私进入内地，成为改革开放后第一课流行音乐启蒙。台湾威权时代的娱乐工业产品，意外承担了软化内地听觉的历史角色——'白天听老邓，晚上听小邓'，一个歌手连起两条线。"}, {"a": "上海时代曲工业南迁", "b": "群星会与国语流行", "type": "dash", "t": "国语时代曲体系的二次扩散", "d": "上海体系迁港后，国语时代曲经唱片与电影输出台湾，与本地群星会电视体系合流，歌手港台两栖。上海—香港—台湾，同一套工业基因的三站接力，最终又以邓丽君的形式回流内地——华语流行乐的血缘是一个环。"}, {"a": "Beatles与作者权革命", "b": "GS热潮Group Sounds", "type": "dash", "t": "披头士冲击波的日本落点", "d": "1966年Beatles武道馆公演（曾引发右翼抗议'圣地被摇滚玷污'）直接点燃GS热潮：数百支西装乐队模仿英伦节拍。热潮三年即被商业收割殆尽，但它完成了乐队编制在日本的普及——地下的乐器与人才储备由此埋下。"}, {"a": "迷幻夏天与反文化", "b": "关西民谣（フォーク）与新宿西口集会", "type": "dash", "t": "1968的全球回声", "d": "旧金山的迷幻夏天与新宿西口的反战民谣集会是同一场全球青年运动的两个现场：反战、公社、音乐即政治。区别在结局——美国的能量随征兵结束而消散，日本的能量在连合赤军事件中自我吞噬。同一场运动，两种死法。"}, {"a": "停止征兵与政治性蒸发", "b": "连合赤军事件", "type": "dash", "t": "政治能量的两种终结", "d": "美国：外部压力（征兵）消失，摇滚的政治性自然蒸发，转向工业化。日本：内部理想主义自我吞噬，社会对政治热情产生永久创伤。两条线在1972-73年同时去政治化，机制却完全不同——一个是松绑，一个是灼伤。此后美日地下音乐的气质分野（犬儒 vs 内向）都源于这里。"}, {"a": "春天呐喊", "b": "首届迷笛音乐节", "type": "dash", "t": "华语独立音乐节的先后脚", "d": "垦丁春呐（1995）早迷笛（2000）五年，都从小共同体自办活动长成音乐节，都未经商业策划起步。此后的分岔也同构于两地行业：春呐陷入品牌争夺与电音化稀释，迷笛走向规模化与文旅招商——自发的节日长大后都要回答同一个问题：热闹属于谁。"}, {"a": "地下社会开业", "b": "树村聚居", "type": "dash", "t": "同一时刻的两种自建", "d": "1996年师大路地下室与1997年树村平房，几乎同时出现的地下据点。台北的版本依托城市消费空间（酒吧执照），北京的版本依托城乡结合部的废弃地带（低租金）。空间形态不同，功能相同：给还不值钱的音乐一个发生的地方。"}, {"a": "Beyond从地下到主流", "b": "树村聚居", "type": "dash", "t": "启蒙的南风北渐", "d": "树村一代的成长期正值Beyond经盗版磁带风行内地，《光辉岁月》《海阔天空》是无数外省青年拿起吉他的第一课。香港工业阴影下妥协求存的乐队，在北方成了纯粹理想主义的图腾——启蒙从来伴随误读，而误读有时比原意更有生产力。"}, {"a": "Napster击穿唱片工业", "b": "豆瓣网易云与线上聚集", "type": "dash", "t": "数字冲击的两地时差", "d": "Napster（1999）击穿的是成熟的唱片工业；内地的MP3与BT时代冲击的却是一个从未真正建成的正版市场——内地跳过了唱片黄金期直接进入数字时代。没有可失去的过去，反而让流媒体平台在内地长得比任何地方都大、都垄断。"}, {"a": "Spotify与流媒体时代", "b": "流媒体与算法时代", "type": "dash", "t": "过剩时代的两种垄断", "d": "Spotify模式：订阅制+推荐算法，独立音乐变成播放列表标签。腾讯网易模式：版权独家战+社区化+K歌生态。形态不同，结构后果相同：获取的身份成本归零，探索被推送取代，'独立'从生产方式蜕变为审美滤镜。五条线的信息渠道带在这里汇入同一片海。"}, {"a": "裸体的拉里斯（裸のラリーズ）", "b": "Dead磁带交换网络", "type": "dash", "t": "盗录塑造的两个极端", "d": "两支乐队都主要以乐迷录音的形式存在于世，态度却是两极：Dead授权、鼓励、建制化观众录音；拉里斯拒绝一切，流传的录音全是违背其意愿的盗录。结果殊途同归——都活在自己无法控制的记录里。给TAI的启示：记录终究会发生，唯一的选择是它由谁、以何种质量、在何种权利结构下发生。"}, {"a": "乐队的夏天", "b": "草东获金曲最佳乐团", "type": "dash", "t": "主流化的两岸对照实验", "d": "2017草东经金曲奖的制度旋转门进入主流，乐队保有完整主体性；2019乐夏用综艺剪辑一次性提取一代乐队，人设归平台。几乎同时的两场主流化，一个经由制度，一个经由流量——结果的差异，就是有没有体制化通道的差异。"}, {"a": "Tiny Desk开播", "b": "中古唱片店与档案帝国", "type": "dash", "t": "记录机制的两种形态", "d": "品牌化记录（Tiny Desk：权威机构、统一美学、中心化信任）与分布式记录（日本：档案习惯散布于唱片店、场刊、乐迷日常）。前者见效快、依赖品牌存续；后者见效慢、几乎不可摧毁。TAI的长期战略：先做前者建立权威，再把习惯下沉为后者——这条虚线连接的是它的两个阶段。"}, {"a": "反修例与场景离散", "b": "文化部乐团补助体系", "type": "solid", "t": "离散的落点", "d": "2019后移居台北的香港音乐人，落入的正是台湾的补助与场馆体系：申请补助、进驻场馆、登上大港开唱。被清空的能量被慢性收编的结构接收——五种收编类型在这条线上完成了一次跨线咬合。海外港乐能否在台北保持自己的声音，是这条连接的开放问题。"}, {"a": "美八军舞台", "b": "美军占领与基地俱乐部", "type": "dash", "t": "驻军喂养的三连之二", "d": "日本基地俱乐部与韩国美八军舞台：同一支军队在两个国家复制了同一个音乐孵化器。乐手在其中学会西方流行乐全部技艺，退出后成为本国工业的第一代骨干。加上台湾AFNT电台，东亚三条线的现代流行乐都始于美军的文化副产品。"}, {"a": "美八军舞台", "b": "美军电台AFNT", "type": "dash", "t": "驻军喂养的三连之三", "d": "韩国的舞台、台湾的电台：一个训练演奏者，一个训练聆听者。冷战驻军无意间为整个东亚完成了摇滚乐的原始积累。"}, {"a": "光州与民众歌谣运动", "b": "美丽岛事件", "type": "dash", "t": "民主化的音乐伴奏：韩台同步", "d": "1979美丽岛与1980光州相隔数月，此后两地都出现了承载民主化运动的地下歌谣（民众歌谣/党外歌曲），并都在1987年迎来转折（民主化宣言/解严）。韩台两条线的政治节拍同步到逐年对应——威权松动期的文化爆发是有公式的。"}, {"a": "三大社与练习生制度", "b": "选秀与练习生模式引进", "type": "solid", "t": "警告线：先发制人收编的移植", "d": "超女(2005)引入选秀，偶像练习生(2018)完成韩式练习生体系的全盘移植。这条实线是整张图上对MAO和TAI威胁最直接的一条：如果内地音乐工业走向韩国形态，livehouse与独立场景将被永久锁死在人才水库位置。对策也写在韩国线上——K-indie借管道出海证明水库有出路，但前提是自己先有内容资产。"}, {"a": "嘻哈在布朗克斯诞生", "b": "中国有嘻哈", "type": "dash", "t": "四十年语法的一次性提取", "d": "布朗克斯1973到爱奇艺2017：嘻哈用四十年在地下积累的语法（battle、diss、real）被一档综艺一次性提取为内地娱乐工业的新燃料。与乐夏对摇滚的提取完全同构，只是更快、更彻底——因为嘻哈在内地的地下积累期更短，抵抗力更弱。"}, {"a": "Motown厂牌帝国", "b": "D-22与兵马司", "type": "dash", "t": "自建工业的两个刻度", "d": "Motown证明被提取者可以自建完整工业并夺回收益权；兵马司是内地朝这个方向走出的第一步——但只完成了录音出版，未及现场、发行、艺人开发的全链条。这条虚线度量的是'自建'还差多远，TAI的位置就在这个差距里。"}, {"a": "AI生成音乐爆发", "b": "AI生成音乐与风格考古", "type": "dash", "t": "同一场革命的两副面孔", "d": "在欧美，AI生成引发的是作者性与版权战争；在内地，同一批工具同时扮演着风格教师——把被历史跳过的灵歌、放克谱系补课给一代听众。破坏与启蒙由同一个技术同时完成，这在六条线的渠道史上是第一次。"}, {"a": "方大同去世", "b": "Ray Charles世俗化福音", "type": "dash", "t": "灵歌谱系的华语终端", "d": "Ray Charles把教堂唱法引入世俗，六十年后方大同把这套语法系统性译入华语——他是灵歌福音传统在中文世界最重要的布道者。2025年他的离世引发重听潮，无数听众由此第一次溯源到Marvin Gaye与教堂——哀悼成为风格教育，谱系在告别中完成闭环。"}, {"a": "真实现场是否最后的稀缺品", "b": "记录机制空格", "type": "dash", "t": "终极问题与结构位置", "d": "如果AI时代唯一不可生成的是身体在场，那么现场及其可信记录就是行业最后的稀缺资产。欧美线的开放问题与内地线的空格在此相接：前者给出价值假设，后者给出结构位置——两者相加就是苔上TAI的完整论证。"}, {"a": "卡拉OK的发明", "b": "夜总会歌厅体系", "type": "dash", "t": "表演权的下放与专业化的黄昏", "d": "卡拉OK把表演从歌女乐师手里交还给客人，东亚的夜间音乐经济从'听人唱'转向'自己唱'。香港歌厅体系的式微与KTV时代的到来是同一个过程——表演权下放重塑了整个夜间娱乐的空间形态。"}, {"a": "Bad News厂牌与亚洲通道", "b": "MAO鼓楼开业", "type": "solid", "t": "通道的落地：资本、设备与制度 const PBIO = {"Chuck Berry": "摇滚吉他语言与歌词叙事的真正发明者——Lennon说'如果给摇滚换个名字，就该叫Chuck Berry'。能量的创造者，收益分配的输家。", "Little Richard": "'A-wop-bop-a-loo-bop'——教堂呼喊技术最狂暴的世俗化，摇滚嗓音美学的源头。晚年反复在布道与摇滚之间往返，圣俗拉锯的一生。", "Bob Geldof": "Boomtown Rats主唱，Live Aid总策划——用一场演出发明了'全球慈善直播'这个行业，也把摇滚的道德资本第一次大规模变现。", "PSY": "《江南Style》以自嘲舞曲意外成为YouTube时代第一个非英语顶流——K-pop全球管道的验证者，却不是这个工业的标准产品：一次计划外的成功证明了管道，随后被标准产品接管。", "房时赫": "Big Hit（现HYBE）创始人，BTS的总设计师。把粉丝关系平台化（Weverse）、把偶像工业升级为科技公司——'人的工业'估值逻辑的改写者。", "老狼": "《同桌的你》演唱者，校园民谣的声音符号——一代人的青春记忆载体，也是这个热潮速朽的见证人。", "高晓松": "校园民谣的词曲与操盘者，后成为媒体人——从创作者到叙事者的转身，恰好横跨内地内容产业的两个时代。", "董亚千": "万能青年旅店主唱兼吉他手，石家庄——用小号与失真吉他把一座工业城市写进华语音乐正典的人。", "赵雷": "《成都》让玉林西路的小酒馆变成打卡景点——一首民谣温柔地收编了一个地下据点，他本人是这次收编的无意作者。", "黎锦晖": "明月歌舞团创始人，中国流行音乐的第一个工业设计师——时代曲的语法由他写定，1949年后被批判至沉寂。", "周璇": "金嗓子，时代曲的声音顶点——她的人生（孤儿、巨星、精神崩溃、早逝）就是上海娱乐工业黄金期的完整寓言。", "邓丽君": "台湾群星会体系培养、日本演歌工业打磨、经走私磁带软化整个内地的耳朵——一个歌手就是一条跨越三条线的通道。", "任毅": "南京知青，1970年因《我的家乡》（南京之歌）被判死刑后改判十年——手抄歌本时代信息成本的人证：一首歌，一条命的价格。", "阿炳": "华彦钧，无锡街头艺人，双目失明。1950年杨荫浏录下他六首曲目，数月后去世——《二泉映月》成为绝响。他不知道那台钢丝录音机意味着什么：他是内地记录机制的第一个对象，而非参与者。", "冈林信康": "'民谣之神'，新宿西口集会的精神领袖——集会被清场后隐居务农，日本抗议音乐的退场以他的转身为标志。", "平野悠": "新宿LOFT创始人，日本livehouse制度的奠基者之一——半个世纪的经营证明：场地长寿是一门可以传承的手艺。", "Bill Graham": "Fillmore主理人，现代巡演制度的发明者——把演出从散场生意变成体系。乌克兰犹太难民出身，死于直升机事故，一生是美国演出工业的编年史。", "李泰祥": "《橄榄树》作曲者，学院作曲家投身流行——民歌运动艺术高度的保证人，严肃音乐与流行之间的摆渡者。", "吴维": "生命之饼主唱，武汉朋克的精神领袖，VOX参与创办者——'朋克之城'这个名号一半是他喊出来的，一半是他建场地撑起来的。", "YOSHIKI": "X Japan领袖，视觉系动员体系的总设计师——私设歌迷会、独立厂牌Extasy、极端形象管理，不经主流媒体攻入东京巨蛋的路线图作者。", "Bruce Springsteen": "【欧美 · 音乐人 · 1973–至今】从未属于地下（首日即签Columbia），也从未被收编（无可收编）——他代表第三条路径：靠演出劳动本身建立可信度。E Street Band四小时不缩水的现场、《Live/1975-85》现场箱装的商业奇迹、七十多岁仍以巡演为主要存在方式。工人阶级的现场伦理：真实性不来自身份，来自你在台上流的汗。", "吕志强": "愚公移山主理人，从路尚咖啡到台球厅跨界开店。二十年坚持自主办演出、自负盈亏——北京livehouse里最长寿的独立样本。", "刘非": "School创始人，也长期把北京乐队带去上海演出——后海大鲨鱼、Carsick Cars早年的跨城通道。小场地立场的代表人物。", "张海生": "育音堂创始人，二十年坚守上海本土原创现场——重塑、万青、刺猬年轻时都从他的台上走过。", "贾敏恕": "魔岩制作人，唐朝专辑与红磡演唱会的实际制作操盘手——台湾工业方法落地北京的执行者。", "吴吞": "舌头乐队主唱，树村时代的精神人物。'姑娘漂亮'式的词锋后来转向更沉默的诗。舌头的现场被公认殿堂级，却几乎没有留下专业录音——记录缺失的第一受害者。", "高虎": "痛仰主唱，从新疆听打口带到树村排练房。痛仰从'哪里有压迫哪里就有反抗'到'愿爱无忧'的转变，是树村一代与时代和解路径的标本。", "谢天笑": "从山东到树村的冷血动物主唱，被称为中国摇滚现场之王——他的价值恰恰只在现场成立，也因此最能说明现场记录缺失意味着什么。", "李赤": "MAO鼓楼创始人之一，广告公司出身的文艺青年，与千叶和利合伙把livehouse制度落地北京。", "千叶和利": "东京独立厂牌Bad News老板，四十余年专注引进外国乐队。2002年来华签下脑浊，2007年与李赤合创MAO并出资300-400万、从日本带来设备与调音师——内地livehouse的日本基因由他携带。2016年将品牌售予世纪乐梦。", "杨海崧": "PK14主唱、兵马司制作人——内地地下录音标准的实际建立者，D-22一代几乎所有重要专辑背后都有他。音乐人兼记录者的稀有样本。", "张亚东": "内地最具影响力的流行制作人之一，从窦唯、朴树到乐夏舞台——他的存在横跨地下与主流三十年，是'制作人'这个角色在内地从隐身到台前的化身。", "彭磊": "新裤子主唱。从地下朋克到乐夏顶流，他的坦率（'没有梦想'论）撕开了收编时代的体面——被提取者中最清醒也最幽默的发言人。", "小山田圭吾": "Cornelius，涩谷系代表。2021年奥运开幕式前因早年霸凌旧闻辞职——涩谷系'品味即人格'神话的坍塌时刻。", "竹内玛利亚": "《Plastic Love》的演唱者。这首1984年的歌经YouTube算法在2017年后全球复活——City Pop二次生命的化身，算法考古的第一个超级样本。", "大泷咏一": "日本流行乐的录音室完美主义者，《A LONG VACATION》定义了City Pop的音响标准。是快乐的低语（happy end）乐队成员——日语摇滚可行性论战的胜利者之一。", "井上大佑": "卡拉OK伴奏机发明者，未申请专利，错过亿万财富。2004年获搞笑诺贝尔和平奖——'让人们学会忍受彼此歌声'。", "金敏基": "《晨露》作者，民众歌谣的源头人物。歌曲被禁二十年反而成为民主化运动的国歌——禁令是最好的发行渠道。", "朴轸永": "JYP创始人，练习生制度三巨头之一，以'人格审查'式选拔著称——把道德纳入偶像质检标准的人。", "梁铉锡": "徐太志的伙伴，YG创始人——从被收编的地下舞者到收编体系的建造者，一个人走完了整个循环。", "侯德健": "《龙的传人》作者，1983年从台湾'叛逃'北京——两岸音乐线的第一个跨线者，后经历1989，人生本身是一部冷战末期文化史。", "齐豫": "民歌运动的声音顶点，《橄榄树》的演唱者——三毛的词、李泰祥的曲、她的声音，民歌运动艺术成就的三位一体。", "颜峻": "乐评人、噪音音乐人、打口一代的书写者。《燃烧的噪音》记录了没人记录的年代——在没有记录机制的线上，一个人用文字勉力充当了档案馆。", "Pearl Sisters": "申重铉体系的第一代成果，韩国迷幻灵魂乐的声音——1975年随体系一同被斩首。", "Holland-Dozier-Holland": "Motown内部写歌团队，流水线方法的实际执行者——三个人写出几十首冠军曲，工业化创作可行性的第一批证人。", "Grandmaster Flash": "嘻哈DJ技术的体系化者，把Herc的直觉变成可传授的技艺——《The Message》让嘻哈第一次承载社会叙事。", "Bob Boilen": "NPR编辑，Tiny Desk创始人——'让乐队来我办公桌演'的玩笑话作者，眼光型记录机制的当代化身。", "王迪": "崔健早期伙伴、ADO乐队成员——80年代北京涉外音乐圈的核心节点之一。", "张楚": "魔岩三杰之一，《孤独的人是可耻的》——黄金期崩塌后长期沉默，'诗人型'摇滚在内地的命运标本。", "何勇": "魔岩三杰之一，《垃圾场》的愤怒与红磡之夜'香港的姑娘们你们漂亮吗'——高光与坠落之间距离最短的人。", "Sam Phillips": "【欧美 · 制作人 · Sun唱片 · 1950–1969】Sun唱片创始人，录下Elvis第一支单曲，也最早录制Howlin' Wolf、Johnny Cash。'给我一个唱黑人音乐的白人'的说法归于他名下——种族翻唱经济的操盘手，摇滚原罪的第一责任人，也是它的第一个天才。", "Berry Gordy": "【欧美 · 创始人 · Motown · 1959–1988】用福特流水线方法组织黑人音乐生产，建成美国最大黑人拥有企业。证明被提取者可以自建工业并夺回收益权——收编模型最重要的反例人物。", "Bob Dylan": "【欧美 · 创作者 · 1961–至今】把民谣的严肃性与文学性注入流行音乐，1965年插电背叛民谣纯洁主义——一个人完成了'表达者主权'的两次示范：先证明歌可以承载思想，再证明创作者不欠任何场景忠诚。", "John Peel": "【欧美 · 电台DJ · 记录者 · 1967–2004】BBC电台DJ，Peel Sessions四十年录制了数千支未成名乐队的电台现场——The Fall录了24次。一个人就是一套记录机制：眼光+持续+存档。TAI这类事业在人物谱系上的直系祖先。", "DJ Kool Herc": "【欧美 · DJ · 嘻哈创始 · 1973–1990】1973年布朗克斯派对上延长break段落，发明了嘻哈的技术地基。全球最大音乐类型的起点是一个牙买加移民少年的街区派对——地下创造力与其最终归属的落差在他身上最刺眼：他本人几乎没从这个产业获益。", "Kurt Cobain": "【欧美 · 音乐人 · Nirvana · 1987–1994】把地下摇滚带到Billboard榜首，又被这次成功杀死。他的死是收编代价的人格化——一个真诚的地下音乐人无法在'另类'成为营销类别后继续自处。Unplugged专场成为他的遗嘱，也成为记录机制价值的最终证词。", "美空云雀": "【日本 · 歌手 · 1949–1989】从废墟慰问演出唱到国民歌手，昭和歌谣的化身。她的嗓音承载了战败一代的全部哀恸与重建意志——她1989年去世与昭和终结同年，一个人的生命精确对齐一个时代。", "水谷孝": "【日本 · 音乐人 · 裸のラリーズ · 1967–2019】拒绝发行、拒绝采访、拒绝被拍摄，用半个世纪实践'存在但不可占有'。死后档案计划启动，海量录音出版——他用一生反对的事情在他死后彻底发生。记录意志与个人意志的终极案例。", "山下达郎": "【日本 · 音乐人 · 制作人 · 1975–至今】City Pop的技艺顶点，四十年拒绝流媒体上架自己的作品——丰裕之声的创造者同时是数字过剩时代最顽固的抵抗者。他的存在证明'不可获得性'本身可以是一种立场。", "小西康阳": "【日本 · 制作人 · Pizzicato Five · 1985–至今】涩谷系的方法论化身：唱片行档案知识+引用拼贴+品味即作品。他把'消费过去'变成一种创作，也无意间为全球数字时代的音乐怀旧经济写好了说明书。", "灰野敬二": "【日本 · 音乐人 · 不失者 · 1970–至今】日本暗黑系谱五十年不退场的化身，不追求听众、追求极端体验的纯度。他证明了livehouse制度的深层功能：一个不筛选美学的空间体系，可以让最不可能商业化的音乐持续存在半个世纪。", "申重铉": "【韩国 · 音乐人 · 制作人 · 1957–1975】韩国摇滚教父，美八军舞台出身，建立自己的厂牌与艺人体系（Pearl Sisters、金秋子）。1975年拒绝为朴正熙写颂歌，以大麻罪名入狱、禁演——被政权物理斩首的音乐工业奠基人。", "金光石": "【韩国 · 歌手 · 民众歌谣 · 1984–1996】民主化运动一代的声音，把民众歌谣从集会现场带进千万人的日常。1996年自杀身亡——民主化完成后，抗争歌手的位置突然悬空，他的死常被解读为一个时代功能消失后的个人代价。", "徐太志": "【韩国 · 音乐人 · Seo Taiji and Boys · 1992–至今】三年改写韩国音乐市场后在顶点解散。韩国流行乐以他为界分前后：他证明了青少年市场的规模，他的前队友梁铉锡随后创办YG——地下能量的携带者亲手参与建立了偶像工业。", "李秀满": "【韩国 · 制作人 · SM创始人 · 1989–至今】练习生制度的总设计师：选拔-封闭训练-出道-偿还成本的'文化技术'（Culture Technology）体系。先发制人收编的第一作者——不等地下长出来，直接工业化生产音乐人。K-pop的全部辉煌与全部代价都从他的方法论开始。", "李双泽": "【台湾 · 创作者 · 运动点火者 · 1976–1977】淡江那一夜拿可乐瓶质问'我们自己的歌在哪里'，次年为救人溺亡，年31岁。活跃期不足两年，却触发了台湾流行音乐工业此后二十年的全部人才积累——历史上性价比最高的一次登台。", "罗大佑": "【台湾 · 创作者 · 1982–至今】戒严审查逼出的隐喻密度在他手里达到顶点：《之乎者也》《亚细亚的孤儿》用医生的精确解剖时代。华语流行乐的批判传统由他确立标高——此后所有'有话要说'的创作者都在他画的坐标系里。", "李宗盛": "【台湾 · 制作人 · 词人 · 1982–至今】从校园民歌运动走出的制作人典范：把日常语言炼成歌词、把艺人开发做成方法。滚石体系的中场大脑——台湾工业'代工到品牌'路径在音乐上的人格化，华语音乐制作人权力的定义者。", "张培仁": "【台湾 · 企划人 · 魔岩创始 · 1988–至今】魔岩文化创始人，把台湾工业方法带进北京，制造了1994红磡之夜。跨线人物：台湾线与内地线在他身上物理交汇。他后来反思'我们来得太早'——外来资本与本土生态时差的亲历者与第一证人。", "林强": "【台湾 · 音乐人 · 配乐家 · 1990–至今】《向前走》把台语从悲情翻转为进取，完成语言翻身的临门一脚；此后急流勇退转入电影配乐（侯孝贤长期合作者），从流行明星变成声音作者——两次转身都精准踩在时代的节拍上。", "许冠杰": "【香港 · 音乐人 · 1971–至今】港大毕业生用市井俚语开创粤语流行曲，让母语从'低俗'翻身为主流。香港本土意识的第一个声音符号——粤语歌五十年的一切，从他的《鬼马双星》开始。", "顾嘉辉": "【香港 · 作曲家 · 制作体系 · 1961–2015】无线电视音乐总监，与黄霑搭档写下电视剧歌曲黄金期的半壁江山。他建立的'剧集-金曲'咬合体系是香港工业精密化的核心装置——工业化不是贬义词的证明，也是它挤压地下空间的机制本身。", "黄霑": "【香港 · 词人 · 研究者 · 1965–2004】《上海滩》《沧海一声笑》的词作者，晚年以博士论文《粤语流行曲的发展与兴衰》亲手为自己参与建造的工业写下学术讣告——创作者与史官同体，六条线上仅此一人。", "黄家驹": "【香港 · 音乐人 · Beyond · 1983–1993】地下出身、进入主流、死于综艺录制现场。'香港没有乐坛，只有娱乐圈'是他的判词，他的死是这句话最残酷的注脚。在内地，他经盗版磁带成为一代外省青年拿起吉他的理由——误读比原意传播得更远。", "杨荫浏": "【内地 · 音乐学家 · 采录者 · 1936–1984】1950年用钢丝录音机录下阿炳，主持全国民族音乐采录。内地第一个记录机制的操作者——但这个机制由国家运营，记录与收编同体。他保存了声音，也参与决定了声音被如何理解。", "崔健": "【内地 · 音乐人 · 1984–至今】中国摇滚的起点与四十年的坐标原点。诞生在官方晚会、拒绝上《同一首歌》、至今坚持现场——他一个人的选择史就是内地摇滚与体制关系的完整年表。", "窦唯": "【内地 · 音乐人 · 1988–至今】从黑豹到魔岩三杰到彻底转身——拒绝媒体、拒绝怀旧、三十年持续发行实验音乐。红磡神话的亲历者用后半生实践对那个神话的否定：不做符号，只做声音。内地线上最接近日本'内向修行'气质的人。", "张帆": "【内地 · 教育者 · 迷笛创始 · 1993–至今】迷笛学校与迷笛音乐节创始人。给穷孩子建了学校，给生态建了节日——内地'自建基础设施'的第一人。从学生汇演到政府招商的迷笛三十年，也是他个人理想主义被规模稀释的三十年。", "Michael Pettis": "【内地 · 厂牌创始 · D-22/兵马司 · 2006–2016】北大金融学教授，业余建立了内地最重要的地下录音档案。内地自己的记录机制，第一个版本由一个美国经济学家出资建立——这个事实本身就是内地线结构缺陷的证据。", "沈黎晖": "【内地 · 创始人 · 摩登天空 · 1997–至今】清醒乐队主唱转身为内地最大独立音乐商业体的老板：厂牌、草莓音乐节、艺人经纪全链条。本土工业化的第一完整样本——批评者叫它收编，辩护者叫它生存，两种说法都对。"};

const VBIO = {"温布利体育场": "【伦敦 · 1923–至今】Live Aid主场。'温布利'从此成为现场规格的世界单位——一场演出的价值第一次主要发生在19亿不在场的观看者身上，在场与观看的分离从这里开始。", "Haçienda": "【曼彻斯特 · 1982–1997】Factory厂牌开的俱乐部，acid house登陆英国的滩头，锐舞时代的圣殿。长期亏损靠New Order唱片收入输血——'最重要的场地在商业上失败'这个悖论的旗舰案例，1997年关闭后原址成为公寓楼。", "CBGB": "【纽约 · 1973–2006】Bowery街朋克产房，规则只有'必须演原创'。Ramones、Television、Patti Smith从这里出发。2006年死于租金纠纷，原址成为奢侈男装店并保留涂鸦墙作装饰——反叛的尸体被制成时尚的标本。", "100 Club": "【伦敦 · 1942–至今】牛津街地下室八十余年不辍。1976年9月的朋克特别节两晚（Sex Pistols、Clash、Siouxsie）把一场街头骚动定格为运动。伦敦最长寿的现场空间——长寿的秘诀是从不属于任何一场运动。", "Fillmore": "【旧金山 · 1965–至今】Bill Graham的场地帝国起点，迷幻海报文化与现代巡演制度的发源地。后归入Live Nation——第一代独立场地被演出工业收编的原型，'独立场地的宿命'问题从它开始。", "Whisky a Go Go": "【洛杉矶 · 1964–至今】日落大道旗舰，Doors曾驻场。西海岸摇滚工业的门面型场地——它的长寿靠的是与唱片工业的共生，而非对抗。", "Paradise Garage": "【纽约 · 1977–1987】Larry Levan的DJ圣殿：不卖酒、音响为跳舞而非盈利设计。'车库浩室'以它命名。它确立了DJ与舞池也可以构成'现场'——表演者不必在台上。", "Berghain": "【柏林 · 2004–至今】废弃发电站改造，以门口筛选的不可预测与馆内禁止拍照闻名。在一切场地直播化的时代反向证明：进不去与拍不了——稀缺性与神秘性仍是现场最硬的资产。", "京都磔磔": "【京都 · 1974–至今】大正时代酒藏改造，木结构声场被乐手奉为传奇，名字取自竹子生长之声。建筑本身即档案：五十年演出渗进木头里，空间成为可以走入的历史。", "新宿LOFT": "【东京 · 1976–至今】日本livehouse活化石，从民谣咖啡转向摇滚朋克，几乎所有地下系谱都经过它的台。长寿不是运气是制度：低租金结构、社群忠诚、店长制的代际传递。", "下北泽SHELTER": "【东京 · 1991–至今】LOFT系小场，下北泽生态的锚点。日本式代际传递的标准装置：新乐队在此出道，成名后回归开纪念专场——一个空间同时是起点和还愿处。", "难波BEARS": "【大阪 · 1987–至今】关西地下的心脏，Boredoms等关西噪音的出发地。由音乐人山本精一长期主理——乐手办场地，美学立场先于经营逻辑的样本。", "日本武道馆": "【东京 · 1964–至今】奥运柔道馆。1966年Beatles公演引发'圣地被摇滚玷污'的右翼抗议——从此'武道馆公演'成为日本音乐人的加冕仪式：一座抵抗过摇滚的建筑最终成了摇滚的圣殿。", "弘大Drug": "【首尔 · 1994–2004】弘大地下室，Crying Nut驻场，'朝鲜朋克'在此自我命名。练习生制度国度里的第一间朋克产房——证明只要有一间地下室，朋克照样发生。", "Rolling Hall": "【首尔 · 1995–至今】弘大三十年幸存者，韩国indie在偶像工业夹缝中的常设舞台。", "The Wall": "【台北 · 2003–至今】公馆地下室，独立乐团主力中型场——1976、闪灵、草东都从这里过。台北场景的'第二级台阶'：小场之上、体育馆之下的那一格。", "女巫店": "【台北 · 1996–至今】咖啡馆式小场，白天卖咖啡晚上演出，陈绮贞、张悬、安溥的产房。女性创作者谱系需要自己的空间形态——不是更小的livehouse，而是另一种亲密性的房间。", "Legacy": "【台北 · 2009–至今】华山文创园区内，文创园区模式与音乐场地结合的台湾样本——空间体制化的得与失都在它身上。", "北京工人体育馆": "【北京 · 1961–至今】1986年'让世界充满爱'百名歌星演唱会在此举行，崔健唱出《一无所有》——中国摇滚的诞生地是一座国家体育馆，先主流后地下的空间证据。", "红磡体育馆": "【香港 · 1983–至今】香港演唱会工业的圣殿，'开红馆'即成功的同义词。1994年'摇滚中国乐势力'之夜让它意外成为内地摇滚神话的坐标——一座工业圣殿收留了一场地下加冕。", "嚎叫俱乐部": "【北京五道口 · 1998–2003】无聊军队朋克场景的物理据点，嚎叫唱片同源。设备简陋执照模糊，但它让'地下'第一次有了每周固定发生的地址。", "忙蜂酒吧": "【北京 · 1996–2002】livehouse一词进入中国前的摇滚酒吧代表，树村乐队最早的城里舞台之一——先有将就的舞台，才谈得上专业的舞台。", "迷笛学校礼堂": "【北京 · 1993–】迷笛音乐节的出生地：2000年校园汇演免费开放，观众爬墙进场——中国第一个原创音乐节的第一个场地是一间学校礼堂。", "HMV涩谷店": "【东京 · 1990–2010】涩谷系的策展中枢：店员手写推荐卡定义了'涩谷系'这个词本身。一家唱片店成为一个流派的命名者与发行台——零售空间作为文化机制的顶点，2010年闭店即一个时代落幕。", "垦丁": "【台湾屏东 · 1995–】春天呐喊的场地不是建筑而是海滩——华语世界第一个独立音乐节选择了体制外的地理：没有场馆的地方，规则也最少。", "新宿西口地下广场": "【东京 · 1969】反战民谣集会每周数千人聚集之地，被警方清场后告示牌上'广场'被改为'通路'——空间的重新命名就是政治本身。"};

const canvas = document.getElementById('canvas');
let ANCHORS = {};

let COLLAPSED = new Set();
const vp = document.getElementById('viewport');
const X = y => (y - Y0) * pxYear + 60;
const CHW = IS_DESKTOP?11.5:13;
const estW = ev => ev.e? (ev.t.length*CHW+((ev.e-ev.s)*pxYear)+80) : (ev.t.length*CHW+80);

function render(){
  canvas.innerHTML='';
  ANCHORS = {};
  const activeRegs = REGIONS.filter(r=>regOn.has(r));
  const width = X(Y1)+120;
  // per-lane layout
  let yCursor = 0; const laneMeta = [];
  const ROW_H = IS_DESKTOP?24:32, PAD_T = IS_DESKTOP?26:34, PAD_B = IS_DESKTOP?14:16;
  const laneEvents = {};
  activeRegs.forEach(r=>{
    let evs = DATA.filter(d=>d.r===r && catOn.has(d.c)).sort((a,b)=>a.s-b.s || (b.e?1:0)-(a.e?1:0));
    if(COLLAPSED.has(r)){ evs = []; }
    // greedy sub-rows
    const rows=[];
    evs.forEach(ev=>{
      const x0=X(ev.s), x1=x0+estW(ev);
      let placed=false;
      for(let i=0;i<rows.length;i++){ if(x0 > rows[i]+6){ ev._row=i; rows[i]=x1; placed=true; break; } }
      if(!placed){ ev._row=rows.length; rows.push(x1); }
    });
    const h = COLLAPSED.has(r) ? 46 : PAD_T + Math.max(rows.length,1)*ROW_H + PAD_B;
    laneMeta.push({r, y:yCursor, h, n:evs.length});
    laneEvents[r]=evs;
    yCursor += h;
  });
  canvas.style.width = width+'px';
  canvas.style.height = (yCursor+10)+'px';
  // decade gridlines
  for(let y=1800;y<=2030;y+=10){
    const d=document.createElement('div'); d.className='decade'; d.style.left=X(y)+'px';
    d.innerHTML='<i>'+y+'</i>'; canvas.appendChild(d);
  }
  // lanes
  laneMeta.forEach(m=>{
    const L=document.createElement('div'); L.className='lane';
    L.style.top=m.y+'px'; L.style.height=m.h+'px';
    const lab=document.createElement('span'); lab.className='lane-label'; lab.style.color=RCOLOR[m.r];
    lab.innerHTML=m.r+' <small style="color:var(--ink-faint);letter-spacing:0">'+(COLLAPSED.has(m.r)?'▸ '+m.n:'▾')+'</small>';
    lab.onclick=(e)=>{ e.stopPropagation(); if(COLLAPSED.has(m.r))COLLAPSED.delete(m.r);else COLLAPSED.add(m.r); render(); };
    L.appendChild(lab);
    const ax=document.createElement('div'); ax.className='axis'; ax.style.top=(m.h/2)+'px'; ax.style.background=RCOLOR[m.r]; L.appendChild(ax);
    canvas.appendChild(L);
    laneEvents[m.r].forEach(ev=>{
      const e=document.createElement('div'); e.className='ev';
      const isPol = ev.c!=='音乐';
      if(isPol) e.classList.add('pol');
      if(ev.m==='收编时刻') e.classList.add('coopt');
      if(ev.m==='记录机制') e.classList.add('record');
      if(ev.m==='慢性收编') e.classList.add('slow');
      if(ev.m==='场景清空') e.classList.add('wipe');
      if(mkFocus.size && !mkFocus.has(ev.m)) e.classList.add('dim');
      e.style.left=X(ev.s)+'px';
      e.style.top=(m.y+PAD_T+ev._row*ROW_H)+'px';
      let head;
      if(ev.e && !ev.m){ head='<span class="rng" style="width:'+Math.max((ev.e-ev.s)*pxYear,6)+'px;background:'+RCOLOR[ev.r]+'"></span>'; }
      else { head='<span class="dot" style="background:'+(isPol?'var(--ink-dim)':RCOLOR[ev.r])+'"></span>'; }
      e.innerHTML=head+'<span class="lbl">'+ev.s+(ev.e?'–'+ev.e:'')+' '+ev.t+'</span>';
      e.onclick=()=>{ setPin({kind:'node', title:ev.t}); openSheet(ev); };
      e.onmouseenter=()=>litLinks(ev.t,true);
      e.onmouseleave=()=>litLinks(ev.t,false);
      ANCHORS[ev.t]={x:X(ev.s)+4, y:m.y+PAD_T+ev._row*ROW_H+6};
      canvas.appendChild(e);
    });
  });
  // cross-line network
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.id='net'; svg.setAttribute('width',width); svg.setAttribute('height',yCursor+10);
  LINKS.forEach((L,i)=>{
    const A=ANCHORS[L.a], B=ANCHORS[L.b];
    if(!A||!B) return;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    const mx=(A.x+B.x)/2;
    p.setAttribute('d','M'+A.x+','+A.y+' C'+mx+','+A.y+' '+mx+','+B.y+' '+B.x+','+B.y);
    p.setAttribute('class','lnk '+L.type);
    p.dataset.a=L.a; p.dataset.b=L.b;
    p.addEventListener('click',()=>{ setPin({kind:'link', a:L.a, b:L.b}); openLink(L); });
    svg.appendChild(p);
  });
  canvas.appendChild(svg);
  document.getElementById('count').textContent = laneMeta.reduce((a,m)=>a+m.n,0)+' / '+DATA.length+' 节点';
  applyPin();
}

function setPin(p){
  PIN = p;
  applyPin();
}
function applyPin(){
  document.querySelectorAll('.lnk').forEach(el=>el.classList.remove('pin'));
  document.querySelectorAll('.ev').forEach(el=>el.classList.remove('pinres'));
  if(!PIN) return;
  if(PIN.kind==='node'){
    document.querySelectorAll('.lnk').forEach(el=>{
      if(el.dataset.a===PIN.title||el.dataset.b===PIN.title) el.classList.add('pin');
    });
  } else {
    document.querySelectorAll('.lnk').forEach(el=>{
      if(el.dataset.a===PIN.a&&el.dataset.b===PIN.b) el.classList.add('pin');
    });
  }
}
function litLinks(title,on){
  document.querySelectorAll('.lnk').forEach(p=>{
    if(p.dataset.a===title||p.dataset.b===title){ p.classList.toggle('lit',on); }
  });
}
function openLink(L){
  document.getElementById('sh-t').textContent = L.t;
  document.getElementById('sh-m').innerHTML = '<span class="tag">'+L.a+'</span><span>'+(L.type==='solid'?'─ 迁移':'┄ 同构')+'</span><span class="tag">'+L.b+'</span>';
  document.getElementById('sh-s').style.display='none';
  document.getElementById('sh-r').style.display='none';
  const n=document.getElementById('sh-n'); n.textContent=L.d; n.style.display='';
  document.getElementById('sheet').classList.add('open');
}
function openVenue(name){
  document.getElementById('sh-t').textContent = name;
  document.getElementById('sh-m').innerHTML = '<span class="tag">场地</span>';
  document.getElementById('sh-s').style.display='none';
  document.getElementById('sh-r').style.display='none';
  const old=document.getElementById('sh-pp'); if(old) old.remove();
  const n=document.getElementById('sh-n'); n.textContent=VBIO[name]||'（暂无小传）'; n.style.display='';
  document.getElementById('sheet').classList.add('open');
}
function openPerson(name){
  const p = PEOPLE.find(x=>x.n===name);
  const bio = p ? p.bio : (PBIO[name]||'');
  document.getElementById('sh-t').textContent = name;
  document.getElementById('sh-m').innerHTML = p
    ? '<span class="tag" style="border-color:'+RCOLOR[p.r]+';color:'+RCOLOR[p.r]+'">'+p.r+'</span><span class="tag">'+p.role+'</span><span>'+p.s+' – '+(p.e||'至今')+'</span>'
    : '<span class="tag">人物</span>';
  document.getElementById('sh-s').style.display='none';
  document.getElementById('sh-r').style.display='none';
  const old=document.getElementById('sh-pp'); if(old) old.remove();
  const n=document.getElementById('sh-n'); n.textContent=bio||'（暂无小传）'; n.style.display='';
  document.getElementById('sheet').classList.add('open');
}
function openSheet(ev){
  document.getElementById('sh-t').textContent = ev.t;
  const bits = ['<span class="tag" style="border-color:'+RCOLOR[ev.r]+';color:'+RCOLOR[ev.r]+'">'+ev.r+'</span>',
    '<span class="tag">'+ev.c+'</span>',
    '<span>'+ev.s+(ev.e?' – '+ev.e:'')+'</span>'];
  if(ev.m) bits.splice(2,0,'<span class="tag" style="border-color:'+(ev.m.includes('收编')?'var(--coopt);color:var(--coopt)':(ev.m==='记录机制'?'var(--record);color:var(--record)':'var(--ink-dim);color:var(--ink)'))+'">'+ev.m+'</span>');
  document.getElementById('sh-m').innerHTML = bits.join('');
  document.getElementById('sh-s').textContent = ev.n || '';
  document.getElementById('sh-s').style.display = ev.n ? '' : 'none';
  document.getElementById('sh-n').textContent = ev.d || '';
  document.getElementById('sh-n').style.display = ev.d ? '' : 'none';
  if(!ev.d && !ev.n) document.getElementById('sh-n').textContent='（暂无注释）';
  const rr=document.getElementById('sh-r');
  rr.textContent = ev.f ? '出处 · '+ev.f : '';
  rr.style.display = ev.f ? '' : 'none';
  const old=document.getElementById('sh-pp'); if(old) old.remove();
  const pp = EVENT_PP[ev.t]||[];
  const vv = EVENT_VV[ev.t]||[];
  if(pp.length||vv.length){
    const box=document.createElement('div'); box.className='ppchips'; box.id='sh-pp';
    let html='';
    if(pp.length) html+='<span style="font-size:11px;color:var(--ink-faint);align-self:center">人物</span>'+pp.map(n=>'<span class="pc" data-k="p" data-n="'+n+'">'+n+'</span>').join('');
    if(vv.length) html+='<span style="font-size:11px;color:var(--ink-faint);align-self:center;margin-left:'+(pp.length?'8px':'0')+'">场地</span>'+vv.map(n=>'<span class="pc" data-k="v" data-n="'+n+'">'+n+'</span>').join('');
    box.innerHTML=html;
    document.getElementById('sh-n').after(box);
    box.querySelectorAll('.pc').forEach(c=>c.onclick=()=>{ c.dataset.k==='p'?openPerson(c.dataset.n):openVenue(c.dataset.n); });
  }
  document.getElementById('sheet').classList.add('open');
}
function closeSheet(){ document.getElementById('sheet').classList.remove('open'); PIN=null; applyPin(); }

// drag to pan
let drag=null;
vp.addEventListener('mousedown',e=>{ drag={x:e.clientX,y:e.clientY,sl:vp.scrollLeft,st:vp.scrollTop}; vp.classList.add('drag'); });
window.addEventListener('mousemove',e=>{ if(!drag)return; vp.scrollLeft=drag.sl-(e.clientX-drag.x); vp.scrollTop=drag.st-(e.clientY-drag.y); });
window.addEventListener('mouseup',()=>{ drag=null; vp.classList.remove('drag'); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheet(); });

// pinch zoom
let pinch=null;
vp.addEventListener('touchstart',e=>{ if(e.touches.length===2){ const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; pinch={d:Math.hypot(dx,dy), z:pxYear}; } },{passive:true});
vp.addEventListener('touchmove',e=>{ if(pinch && e.touches.length===2){ const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; const nd=Math.hypot(dx,dy); const nz=Math.max(4,Math.min(26,Math.round(pinch.z*nd/pinch.d))); if(nz!==pxYear){ pxYear=nz; document.getElementById('zoom').value=nz; render(); } } },{passive:true});
vp.addEventListener('touchend',()=>{ pinch=null; },{passive:true});
render();
vp.scrollLeft = X(IS_DESKTOP?1960:1985)-(IS_DESKTOP?200:80);
</script>
</body>
